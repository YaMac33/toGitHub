<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>オフラインPDFツール</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <p class="eyebrow">Local PDF Utility</p>
      <h1>オフラインPDFツール</h1>
      <p class="lead">PDFの分割、結合、画像からPDFへの変換をブラウザ内だけで実行できます。ファイルは外部送信されません。</p>
    </header>

    <section class="tool-grid" aria-label="PDFツール">
      <article class="tool-card">
        <div class="card-heading">
          <span class="step-number">1</span>
          <h2>PDFを分割</h2>
        </div>

        <label class="drop-zone">
          <input id="split-file" type="file" accept="application/pdf,.pdf">
          <span class="drop-title">PDFファイルを選択</span>
          <span class="drop-note">クリックしてローカルファイルを選びます</span>
        </label>

        <label class="field-label" for="split-pages">ページ指定</label>
        <input id="split-pages" class="text-input" type="text" placeholder="例: 1-3,5,8-10" autocomplete="off">
        <p class="hint">例: 1 / 1-3 / 1,3,5 / 1-3,5,8-10</p>

        <button id="split-button" class="primary-button" type="button">指定ページを保存</button>
        <div id="split-status" class="status" role="status" aria-live="polite"></div>
      </article>

      <article class="tool-card">
        <div class="card-heading">
          <span class="step-number">2</span>
          <h2>PDFを結合</h2>
        </div>

        <label class="drop-zone">
          <input id="merge-files" type="file" accept="application/pdf,.pdf" multiple>
          <span class="drop-title">複数PDFを選択</span>
          <span class="drop-note">選択順に一覧へ追加します</span>
        </label>

        <div id="merge-list" class="file-list" aria-label="結合するPDF一覧"></div>
        <button id="merge-button" class="primary-button" type="button">PDFを結合</button>
        <div id="merge-status" class="status" role="status" aria-live="polite"></div>
      </article>

      <article class="tool-card">
        <div class="card-heading">
          <span class="step-number">3</span>
          <h2>画像をPDFに変換</h2>
        </div>

        <label class="drop-zone">
          <input id="image-files" type="file" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp" multiple>
          <span class="drop-title">画像ファイルを選択</span>
          <span class="drop-note">PNG / JPEG / JPG / WebP に対応</span>
        </label>

        <div id="image-list" class="file-list" aria-label="PDF化する画像一覧"></div>

        <div class="option-grid">
          <label class="field-label" for="paper-size">用紙サイズ</label>
          <select id="paper-size" class="select-input">
            <option value="image">画像サイズに合わせる</option>
            <option value="a4-portrait">A4縦</option>
            <option value="a4-landscape">A4横</option>
          </select>

          <label class="field-label" for="image-margin">余白</label>
          <select id="image-margin" class="select-input">
            <option value="0">なし</option>
            <option value="24">小</option>
            <option value="48">中</option>
          </select>
        </div>

        <button id="image-button" class="primary-button" type="button">画像をPDF化</button>
        <div id="image-status" class="status" role="status" aria-live="polite"></div>
      </article>
    </section>

    <footer class="privacy-note">
      このツールはブラウザ内で処理を行います。選択したPDFや画像ファイルは外部サーバーに送信されません。
    </footer>
  </main>

  <!-- オフライン利用のため、pdf-lib.min.js を ./lib/pdf-lib/pdf-lib.min.js に配置してください。 -->
  <script src="./lib/pdf-lib/pdf-lib.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
