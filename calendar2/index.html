<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>議会日程カレンダー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__copy">
        <p class="hero__eyebrow">Offline FullCalendar Viewer</p>
        <h1 class="hero__title">議会日程カレンダー</h1>
        <p class="hero__lead">
          <code>events.js</code> の予定データを、オフラインで月表示・週表示・一覧表示できる
          <code>FullCalendar</code> ベースのビューアです。
        </p>
      </div>

      <div class="hero__status">
        <div class="status-card">
          <span class="status-card__label">動作モード</span>
          <strong class="status-card__value">ローカル完結</strong>
          <span class="status-card__meta">外部 CDN なし</span>
        </div>
        <div class="status-card">
          <span class="status-card__label">読み込み元</span>
          <strong class="status-card__value"><code>calendar2/events.js</code></strong>
          <span class="status-card__meta" id="eventCountLabel">予定 0 件</span>
        </div>
      </div>
    </header>

    <main class="workspace">
      <section class="board" aria-label="カレンダーボード">
        <div class="board__toolbar">
          <div class="toolbar-group">
            <span class="toolbar-group__label">絞り込み</span>
            <div id="categoryFilters" class="filter-chips" aria-label="カテゴリ絞り込み"></div>
          </div>

          <div class="toolbar-group toolbar-group--metrics">
            <div class="metric">
              <span class="metric__label">表示期間</span>
              <strong class="metric__value" id="rangeLabel">-</strong>
            </div>
            <div class="metric">
              <span class="metric__label">表示件数</span>
              <strong class="metric__value" id="visibleCountLabel">0 件</strong>
            </div>
            <div class="metric">
              <span class="metric__label">有効カテゴリ</span>
              <strong class="metric__value" id="activeCategoryLabel">0</strong>
            </div>
          </div>
        </div>

        <div id="calendar" class="calendar-host" aria-label="予定カレンダー"></div>
      </section>

      <aside class="inspector" aria-label="予定詳細">
        <section class="panel">
          <div class="panel__header">
            <h2 class="panel__title">カテゴリ</h2>
            <p class="panel__subtitle">色分けルール</p>
          </div>
          <div id="categoryLegend" class="legend-list"></div>
        </section>

        <section class="panel panel--detail">
          <div class="panel__header">
            <h2 class="panel__title">詳細</h2>
            <p class="panel__subtitle">予定をクリックすると内容を表示します</p>
          </div>
          <div id="detailCard" class="detail-card">
            <div class="detail-empty">
              <strong>予定を選択してください</strong>
              <p>月表示・週表示・一覧表示のどこからでも確認できます。</p>
            </div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script src="vendor/fullcalendar/core.global.min.js"></script>
  <script src="vendor/fullcalendar/ja.global.min.js"></script>
  <script src="vendor/fullcalendar/interaction.global.min.js"></script>
  <script src="vendor/fullcalendar/daygrid.global.min.js"></script>
  <script src="vendor/fullcalendar/timegrid.global.min.js"></script>
  <script src="vendor/fullcalendar/list.global.min.js"></script>
  <script src="events.js"></script>
  <script src="app.js"></script>
</body>
</html>
