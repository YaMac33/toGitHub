<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>会議録発言・質疑答弁カウンター</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Minutes Counter</p>
        <h1>会議録発言・質疑答弁カウンター</h1>
      </div>
      <label class="search-box">
        <span>検索</span>
        <input id="searchInput" type="search" placeholder="発言者・氏名・本文・質疑者・答弁者">
      </label>
    </header>

    <main>
      <section class="stats-grid" id="summaryCards"></section>

      <section class="panel-grid">
        <section class="panel">
          <h2>発言者別発言回数</h2>
          <div class="two-columns">
            <div>
              <h3>ラベル別</h3>
              <ol class="ranking" id="speakerLabelRanking"></ol>
            </div>
            <div>
              <h3>氏名別</h3>
              <ol class="ranking" id="speakerNameRanking"></ol>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>記号別・答弁者別</h2>
          <div class="two-columns">
            <div>
              <h3>記号別</h3>
              <ol class="ranking" id="markRanking"></ol>
            </div>
            <div>
              <h3>答弁者ラベル別</h3>
              <ol class="ranking" id="answererLabelRanking"></ol>
            </div>
          </div>
        </section>
      </section>

      <section class="panel">
        <h2>質疑者→答弁者別回数</h2>
        <div class="tree-list" id="qaTree"></div>
      </section>

      <section class="panel warning-panel">
        <h2>未紐づけ答弁一覧</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>答弁ID</th>
                <th>答弁者</th>
                <th>本文冒頭</th>
              </tr>
            </thead>
            <tbody id="unlinkedAnswers"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>発言一覧</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>seq</th>
                <th>記号</th>
                <th>種別</th>
                <th>発言者</th>
                <th>本文冒頭</th>
              </tr>
            </thead>
            <tbody id="speechRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../data/speeches.js"></script>
    <script src="../data/qa_links.js"></script>
    <script src="../data/summary.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
