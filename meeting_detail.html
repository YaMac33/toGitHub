<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会議詳細</title>
  <style>
    /* 最低限のスタイル */
    body { font-family: sans-serif; padding: 20px; }
    #statusBox { background: #eee; padding: 10px; margin-bottom: 20px; font-family: monospace; white-space: pre-wrap; }
    .empty { color: #666; padding: 10px 0; }
    .is-collapsed { display: none; }
    .pattern-block { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    
    /* モーダル用必須CSS（JSが .show クラスで制御するため必須） */
    .modal-backdrop {
      display: none; 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000;
    }
    .modal-backdrop.show { display: block; }
    .modal-content {
      background: #fff; width: 80%; max-width: 500px;
      margin: 10% auto; padding: 20px; border-radius: 4px;
    }
    .calendar-cell.has-events { cursor: pointer; background-color: #e6f7ff; }
  </style>
</head>
<body>

  <h1 id="pageTitle"></h1>
  <p id="pageDesc"></p>

  <div id="statusBox"></div>

  <h2>概要</h2>
  <div id="summaryArea"></div>

  <h2>カレンダー</h2>
  <div id="calendarArea"></div>

  <h2>特別委員会</h2>
  <div id="specialCommitteeArea"></div>

  <h2>案件</h2>
  <div id="itemsArea"></div>

  <div id="dayModalBackdrop" class="modal-backdrop">
    <div class="modal-content">
      <h3 id="dayModalTitle"></h3>
      <div id="dayModalBody"></div>
      <div style="text-align: right; margin-top: 15px;">
        <button id="dayModalClose">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    window.APP_DATA = window.APP_DATA || {};
    window.APP_UTILS = {
      escapeHtml: function(str) { return String(str).replace(/[&<>"']/g, function(m) { return {"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"}[m]; }); }
    };
    window.APP_FORMATTERS = {
      toWareki: function(dateStr) { return dateStr; /* 実装に合わせて修正 */ },
      sessionTypeLabel: function(val) { return val === "REGULAR" ? "定例会" : val === "EXTRA" ? "臨時会" : val; }
    };
  </script>

  <script src="app/js/meetings/view_meeting_detail.js"></script>

</body>
</html>
