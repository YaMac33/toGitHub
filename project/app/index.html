<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>議会通告検索システム</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* カスタムスタイル（ツリー構造の表現など） */
    .tree-row {
      position: relative;
      padding: 12px 0 12px 24px;
      border-bottom: 1px dashed #f1f5f9;
    }
    .tree-row:last-child {
      border-bottom: none;
    }
    .tree-row::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 6px;
      width: 2px;
      background-color: #e2e8f0;
    }
    .tree-row::after {
      content: "";
      position: absolute;
      top: 22px;
      left: 6px;
      width: 12px;
      height: 2px;
      background-color: #e2e8f0;
    }
    .depth-0 { margin-left: 0; }
    .depth-1 { margin-left: 1.5rem; }
    .depth-2 { margin-left: 3rem; }
    
    .tree-label-badge {
      display: inline-block;
      min-width: 48px;
      text-align: center;
      padding: 2px 8px;
      background-color: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #475569;
      margin-right: 12px;
      font-family: monospace;
    }

    /* テーブルのスクロールバー */
    .table-container::-webkit-scrollbar { height: 8px; }
    .table-container::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
    .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-white text-gray-800 font-sans antialiased min-h-screen">

  <div class="max-w-6xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    
    <!-- ヘッダー -->
    <header class="mb-8 pb-6 border-b border-gray-100">
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">議会通告検索システム</h1>
      <p class="text-sm text-gray-500">議員名・内容・通告Noなどで検索し、整理された形式で閲覧できます。</p>
    </header>

    <!-- コントロールパネル -->
    <section class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm mb-8">
      
      <!-- 検索行 -->
      <div class="flex flex-col sm:flex-row gap-3 mb-5">
        <div class="relative flex-1">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
            </svg>
          </div>
          <input id="keywordInput" type="text" placeholder="議員名・内容・通告Noなどで検索..." 
                 class="block w-full pl-10 pr-3 py-2.5 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
        </div>
        <div class="flex gap-2">
          <button id="searchBtn" type="button" class="px-5 py-2.5 bg-gray-900 hover:bg-gray-800 text-white font-medium rounded-xl shadow-sm transition-colors whitespace-nowrap">検索</button>
          <button id="clearBtn" type="button" class="px-5 py-2.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium rounded-xl shadow-sm transition-colors whitespace-nowrap">クリア</button>
        </div>
      </div>

      <!-- 表示切替・ソート行 -->
      <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 border-t border-gray-100 pt-5">
        
        <div class="flex flex-wrap items-center gap-3">
          <span class="text-sm font-bold text-gray-500">表示形式</span>
          <div class="flex bg-gray-100 p-1 rounded-lg">
            <button id="viewTableBtn" type="button" class="px-4 py-1.5 text-sm font-medium rounded-md transition-all">一覧表</button>
            <button id="viewMemberBtn" type="button" class="px-4 py-1.5 text-sm font-medium rounded-md transition-all">人ごと</button>
            <button id="viewSessionBtn" type="button" class="px-4 py-1.5 text-sm font-medium rounded-md transition-all">回ごと</button>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <label for="sortSelect" class="text-sm font-bold text-gray-500 whitespace-nowrap">並び順</label>
          <select id="sortSelect" class="block w-full pl-3 pr-10 py-2 text-sm border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 rounded-lg border bg-white cursor-pointer shadow-sm">
            <option value="desc">新しい順 (降順)</option>
            <option value="asc">古い順 (昇順)</option>
          </select>
        </div>

      </div>
    </section>

    <!-- サマリー（検索状態） -->
    <section class="flex flex-wrap gap-x-6 gap-y-2 mb-6 px-2 text-sm">
      <div class="flex items-center gap-1.5 text-gray-600">
        <span class="font-bold">検索語:</span>
        <span id="summaryKeyword" class="px-2 py-0.5 bg-gray-100 rounded text-gray-800 font-medium">なし</span>
      </div>
      <div class="flex items-center gap-1.5 text-gray-600">
        <span class="font-bold">検索結果:</span>
        <span id="summaryCount" class="text-blue-600 font-bold">0件</span>
      </div>
      <div class="flex items-center gap-1.5 text-gray-600">
        <span class="font-bold">現在の表示:</span>
        <span id="summaryView" class="text-gray-800 font-medium">一覧表</span>
      </div>
    </section>

    <!-- 結果エリア -->
    <main id="resultsArea" class="w-full"></main>

  </div>

  <script>
    // ==========================================
    // データ定義 (元 questions.js の内容)
    // ==========================================
    const RECORDS = [
      { fiscal_year: "6", id: "R811佐藤太郎1", number: "R", year: "8", session: "1", notice_no: "1", member_name: "佐藤太郎", group: "○○会", major_no: "1", middle_no: "-", minor_no: "-", content: "地域防災計画の見直しについて問う。" },
      { fiscal_year: "6", id: "R811佐藤太郎2", number: "R", year: "8", session: "1", notice_no: "1", member_name: "佐藤太郎", group: "○○会", major_no: "1", middle_no: "1", minor_no: "-", content: "避難所の運営体制の現状について問う。" },
      { fiscal_year: "6", id: "R811佐藤太郎3", number: "R", year: "8", session: "1", notice_no: "1", member_name: "佐藤太郎", group: "○○会", major_no: "1", middle_no: "1", minor_no: "1", content: "高齢者対応の具体的な施策について問う。" },
      { fiscal_year: "6", id: "R742鈴木花子1", number: "R", year: "7", session: "4", notice_no: "2", member_name: "鈴木花子", group: "無所属", major_no: "1", middle_no: "-", minor_no: "-", content: "学校ICT環境の整備状況について問う。" },
      { fiscal_year: "6", id: "R742鈴木花子2", number: "R", year: "7", session: "4", notice_no: "2", member_name: "鈴木花子", group: "無所属", major_no: "1", middle_no: "1", minor_no: "-", content: "端末配備率と活用状況について問う。" },
      { fiscal_year: "6", id: "R733田中一郎1", number: "R", year: "7", session: "3", notice_no: "3", member_name: "田中一郎", group: "△△党", major_no: "1", middle_no: "-", minor_no: "-", content: "観光振興施策の現状と課題について問う。" },
      { fiscal_year: "31", id: "H314山田次郎1", number: "H", year: "31", session: "4", notice_no: "1", member_name: "山田次郎", group: "□□会", major_no: "1", middle_no: "-", minor_no: "-", content: "公共交通の維持に関する施策について問う。" }
    ];

    // ==========================================
    // アプリケーションロジック (元 app.js の内容)
    // ==========================================
    (function () {
      "use strict";

      const state = {
        keyword: "",
        viewMode: "table",
        sortOrder: "desc" // asc または desc
      };

      let expandedMap = {};

      const els = {
        keywordInput: document.getElementById("keywordInput"),
        searchBtn: document.getElementById("searchBtn"),
        clearBtn: document.getElementById("clearBtn"),
        viewTableBtn: document.getElementById("viewTableBtn"),
        viewMemberBtn: document.getElementById("viewMemberBtn"),
        viewSessionBtn: document.getElementById("viewSessionBtn"),
        sortSelect: document.getElementById("sortSelect"),
        summaryKeyword: document.getElementById("summaryKeyword"),
        summaryCount: document.getElementById("summaryCount"),
        summaryView: document.getElementById("summaryView"),
        resultsArea: document.getElementById("resultsArea")
      };

      // ユーティリティ
      function escapeHtml(v) {
        return String(v || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeText(v) {
        return String(v || "").replace(/\s+/g, " ").trim();
      }

      function toNumber(v) {
        const n = parseInt(v, 10);
        return isNaN(n) ? 0 : n;
      }

      function getEraPriority(n) {
        n = normalizeText(n).toUpperCase();
        if (n === "R") return 0;
        if (n === "H") return 1;
        return 9;
      }

      function formatYear(number, year) {
        number = normalizeText(number).toUpperCase();
        year = normalizeText(year);
        if (number === "R") return "令和" + year + "年";
        if (number === "H") return "平成" + year + "年";
        return year + "年";
      }

      function formatSession(session) {
        return "第" + toNumber(session) + "回定例会";
      }

      function formatYS(r) {
        return formatYear(r.number, r.year) + " / " + formatSession(r.session);
      }

      function buildTreeLabel(r) {
        const a = normalizeText(r.major_no);
        const b = normalizeText(r.middle_no);
        const c = normalizeText(r.minor_no);
        const arr = [];
        if (a && a !== "-") arr.push(a);
        if (b && b !== "-") arr.push(b);
        if (c && c !== "-") arr.push(c);
        return arr.join("-") || "-";
      }

      function getDepth(r) {
        if (r.minor_no && r.minor_no !== "-") return 2;
        if (r.middle_no && r.middle_no !== "-") return 1;
        return 0;
      }

      // ソートロジック
      function compareRecords(a, b) {
        // 基本は新しい順 (desc) で比較
        let cmp = 0;
        const e = getEraPriority(a.number) - getEraPriority(b.number);
        if (e !== 0) cmp = e;
        else {
          const y = toNumber(b.year) - toNumber(a.year);
          if (y !== 0) cmp = y;
          else {
            const s = toNumber(b.session) - toNumber(a.session);
            if (s !== 0) cmp = s;
            else {
              const n = toNumber(a.notice_no) - toNumber(b.notice_no);
              cmp = n;
            }
          }
        }
        // 昇順(asc)が選ばれている場合は反転
        return state.sortOrder === "asc" ? cmp * -1 : cmp;
      }

      // 検索フィルター
      function filterRecords(records, keyword) {
        const q = normalizeText(keyword).toLowerCase();
        if (!q) return records.slice();

        return records.filter(r => {
          return (
            normalizeText(r.member_name).toLowerCase().includes(q) ||
            normalizeText(r.content).toLowerCase().includes(q) ||
            normalizeText(r.notice_no).includes(q) // 通告Noでも検索可能に
          );
        });
      }

      // グルーピング（人ごと）
      function groupMember(records) {
        const map = {};
        records.forEach(r => {
          const m = r.member_name || "不明";
          if (!map[m]) map[m] = { member: m, group: r.group, ys: {} };

          const ysKey = r.number + "_" + r.year + "_" + r.session;
          if (!map[m].ys[ysKey]) {
            map[m].ys[ysKey] = { number: r.number, year: r.year, session: r.session, notices: {} };
          }

          const n = r.notice_no;
          if (!map[m].ys[ysKey].notices[n]) map[m].ys[ysKey].notices[n] = [];
          
          map[m].ys[ysKey].notices[n].push(r);
        });
        return Object.values(map);
      }

      // グルーピング（回ごと）
      function groupSession(records) {
        const map = {};
        records.forEach(r => {
          const key = r.number + "_" + r.year + "_" + r.session;
          if (!map[key]) {
            map[key] = { number: r.number, year: r.year, session: r.session, notices: {} };
          }

          const n = r.notice_no;
          if (!map[key].notices[n]) map[key].notices[n] = {};

          const m = r.member_name;
          if (!map[key].notices[n][m]) map[key].notices[n][m] = { group: r.group, records: [] };

          map[key].notices[n][m].records.push(r);
        });
        return Object.values(map);
      }

      // ツリーUI描画
      function renderTreeRows(list, limit, expandKey) {
        const expanded = expandedMap[expandKey];
        let html = "";
        let count = 0;

        for (let i = 0; i < list.length; i++) {
          if (!expanded && count >= limit) break;
          const r = list[i];
          const depth = getDepth(r);
          
          html += `<div class="tree-row depth-${depth}">
                     <div class="flex items-start">
                       <span class="tree-label-badge mt-0.5 shadow-sm">${escapeHtml(buildTreeLabel(r))}</span>
                       <div class="text-gray-700 leading-relaxed">${escapeHtml(r.content)}</div>
                     </div>
                   </div>`;
          count++;
        }

        if (!expanded && list.length > limit) {
          html += `<div class="pl-6 mt-2">
                     <button class="more-btn px-4 py-1.5 bg-gray-50 border border-gray-200 text-gray-600 rounded-full text-xs font-bold hover:bg-gray-100 transition-colors shadow-sm" data-key="${expandKey}">
                       残り ${list.length - limit} 件を表示 ▼
                     </button>
                   </div>`;
        } else if (expanded && list.length > limit) {
          html += `<div class="pl-6 mt-2">
                     <button class="more-btn px-4 py-1.5 bg-gray-50 border border-gray-200 text-gray-600 rounded-full text-xs font-bold hover:bg-gray-100 transition-colors shadow-sm" data-key="${expandKey}">
                       折りたたむ ▲
                     </button>
                   </div>`;
        }

        return html;
      }

      // ★ 新規実装：一覧表レンダリング（元のコードのJSONダンプの代替）
      function renderTable(records) {
        if (records.length === 0) return `<div class="p-8 text-center text-gray-500 border border-gray-200 rounded-xl">検索結果がありません</div>`;

        let html = `
          <div class="table-container overflow-x-auto bg-white border border-gray-200 rounded-2xl shadow-sm">
            <table class="min-w-full divide-y divide-gray-200 text-sm">
              <thead class="bg-gray-50">
                <tr>
                  <th scope="col" class="px-4 py-3 text-left font-bold text-gray-500 whitespace-nowrap">定例会</th>
                  <th scope="col" class="px-4 py-3 text-left font-bold text-gray-500 whitespace-nowrap">通告No</th>
                  <th scope="col" class="px-4 py-3 text-left font-bold text-gray-500 whitespace-nowrap">議員名 (会派)</th>
                  <th scope="col" class="px-4 py-3 text-left font-bold text-gray-500 whitespace-nowrap">項目</th>
                  <th scope="col" class="px-4 py-3 text-left font-bold text-gray-500">内容</th>
                </tr>
              </thead>
              <tbody class="bg-white divide-y divide-gray-100">
        `;

        records.forEach(r => {
          html += `
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-4 py-3 whitespace-nowrap text-gray-600 font-medium">${escapeHtml(formatYS(r))}</td>
              <td class="px-4 py-3 whitespace-nowrap"><span class="px-2 py-1 bg-gray-100 text-gray-700 rounded-md font-mono text-xs font-bold">No.${escapeHtml(r.notice_no)}</span></td>
              <td class="px-4 py-3 whitespace-nowrap">
                <div class="font-bold text-gray-800">${escapeHtml(r.member_name)}</div>
                <div class="text-xs text-gray-500">${escapeHtml(r.group)}</div>
              </td>
              <td class="px-4 py-3 whitespace-nowrap"><span class="tree-label-badge m-0">${escapeHtml(buildTreeLabel(r))}</span></td>
              <td class="px-4 py-3 text-gray-700 min-w-[300px]">${escapeHtml(r.content)}</td>
            </tr>
          `;
        });

        html += `</tbody></table></div>`;
        els.resultsArea.innerHTML = html;
      }

      // カード描画（人ごと）
      function renderMemberCards(groups) {
        if (groups.length === 0) {
          els.resultsArea.innerHTML = `<div class="p-8 text-center text-gray-500 border border-gray-200 rounded-xl">検索結果がありません</div>`;
          return;
        }

        let html = '<div class="grid gap-6">';
        groups.forEach(g => {
          html += `
            <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
              <div class="border-b border-gray-100 pb-3 mb-4 flex items-baseline gap-3">
                <h3 class="text-xl font-bold text-gray-900">${escapeHtml(g.member)}</h3>
                <span class="text-sm font-medium text-gray-500 bg-gray-100 px-2 py-0.5 rounded">${escapeHtml(g.group || "所属なし")}</span>
              </div>
          `;

          const ysList = Object.values(g.ys).sort(compareRecords);
          ysList.forEach(ys => {
            html += `<div class="mb-6 last:mb-0">
                       <h4 class="font-bold text-blue-800 bg-blue-50 px-3 py-1.5 rounded-lg inline-block mb-3 text-sm border border-blue-100 shadow-sm">
                         📅 ${escapeHtml(formatYS(ys))}
                       </h4>`;

            const notices = Object.keys(ys.notices).sort((a, b) => state.sortOrder === "asc" ? toNumber(a) - toNumber(b) : toNumber(b) - toNumber(a));
            notices.forEach(n => {
              const list = ys.notices[n].sort(compareRecords);
              const key = `member:${g.member}:${ys.number}${ys.year}${ys.session}:${n}`;

              html += `<div class="ml-2 mb-5 pl-4 border-l-2 border-gray-100">
                         <div class="font-bold text-gray-700 mb-2 flex items-center gap-2">
                           <span class="bg-gray-800 text-white text-xs px-2 py-0.5 rounded-md">通告No.</span>
                           <span class="text-lg">${escapeHtml(n)}</span>
                         </div>
                         <div class="mt-2">${renderTreeRows(list, 3, key)}</div>
                       </div>`;
            });
            html += `</div>`;
          });
          html += `</div>`;
        });
        html += '</div>';
        els.resultsArea.innerHTML = html;
      }

      // カード描画（回ごと）
      function renderSessionCards(groups) {
        if (groups.length === 0) {
          els.resultsArea.innerHTML = `<div class="p-8 text-center text-gray-500 border border-gray-200 rounded-xl">検索結果がありません</div>`;
          return;
        }

        let html = '<div class="grid gap-6">';
        groups.sort(compareRecords).forEach(s => {
          html += `
            <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
              <div class="border-b border-gray-100 pb-3 mb-5">
                <h3 class="text-xl font-extrabold text-blue-900 flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  ${escapeHtml(formatYS(s))}
                </h3>
              </div>`;

          const notices = Object.keys(s.notices).sort((a, b) => state.sortOrder === "asc" ? toNumber(a) - toNumber(b) : toNumber(b) - toNumber(a));
          notices.forEach(n => {
            const members = Object.keys(s.notices[n]).sort();

            html += `<div class="mb-6 last:mb-0 bg-gray-50 rounded-xl p-4 border border-gray-100">
                       <div class="font-bold text-gray-800 mb-3 text-lg border-b border-gray-200 pb-2">
                         通告No. ${escapeHtml(n)}
                       </div>`;

            members.forEach(m => {
              const obj = s.notices[n][m];
              const key = `session:${s.number}_${s.year}_${s.session}:${n}:${m}`;

              html += `<div class="mb-4 last:mb-0 ml-2">
                         <div class="font-bold text-gray-700 flex items-baseline gap-2 mb-2">
                           <span class="text-base">${escapeHtml(m)}</span>
                           <span class="text-xs text-gray-500 font-normal">(${escapeHtml(obj.group || "所属なし")})</span>
                         </div>
                         <div class="pl-2">${renderTreeRows(obj.records.sort(compareRecords), 3, key)}</div>
                       </div>`;
            });
            html += `</div>`;
          });
          html += `</div>`;
        });
        html += '</div>';
        els.resultsArea.innerHTML = html;
      }

      // メインの描画制御
      function render() {
        const data = filterRecords(RECORDS, state.keyword).sort(compareRecords);

        // サマリーの更新
        els.summaryKeyword.textContent = state.keyword ? state.keyword : "なし";
        els.summaryCount.textContent = data.length + "件";
        
        const viewLabels = { table: "一覧表", member: "人ごと", session: "回ごと" };
        els.summaryView.textContent = viewLabels[state.viewMode];

        // ボタンスタイルの更新
        [els.viewTableBtn, els.viewMemberBtn, els.viewSessionBtn].forEach(btn => {
          btn.className = "px-4 py-1.5 text-sm font-medium rounded-md transition-all text-gray-600 hover:bg-gray-200";
        });
        const activeBtnMap = { table: els.viewTableBtn, member: els.viewMemberBtn, session: els.viewSessionBtn };
        activeBtnMap[state.viewMode].className = "px-4 py-1.5 text-sm font-bold rounded-md transition-all bg-white text-blue-700 shadow-sm ring-1 ring-gray-200";

        // モード別レンダリング
        if (state.viewMode === "table") {
          renderTable(data);
        } else if (state.viewMode === "member") {
          renderMemberCards(groupMember(data));
        } else if (state.viewMode === "session") {
          renderSessionCards(groupSession(data));
        }
      }

      // イベントバインディング
      function bind() {
        // 検索ボタン
        els.searchBtn.onclick = () => {
          state.keyword = els.keywordInput.value;
          render();
        };

        // エンターキー検索の追加（機能強化）
        els.keywordInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            els.searchBtn.click();
          }
        });

        // クリアボタン
        els.clearBtn.onclick = () => {
          state.keyword = "";
          els.keywordInput.value = "";
          expandedMap = {};
          render();
        };

        // 表示形式切り替え
        els.viewTableBtn.onclick = () => { state.viewMode = "table"; render(); };
        els.viewMemberBtn.onclick = () => { state.viewMode = "member"; render(); };
        els.viewSessionBtn.onclick = () => { state.viewMode = "session"; render(); };

        // ★新規：ソート切り替え（機能強化）
        els.sortSelect.onchange = (e) => {
          state.sortOrder = e.target.value;
          render();
        };

        // 「もっと見る」ボタンのイベント委譲
        els.resultsArea.onclick = (e) => {
          const btn = e.target.closest(".more-btn");
          if (!btn) return;
          const key = btn.getAttribute("data-key");
          if (!key) return;
          expandedMap[key] = !expandedMap[key];
          render();
        };
      }

      // 初期化
      bind();
      render();
    })();
  </script>
</body>
</html>
