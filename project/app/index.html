<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>議会通告検索システム</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
    }

    .topbar {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
      box-sizing: border-box;
    }

    .mode-btn {
      padding: 8px 14px;
      border: 1px solid #bbb;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .mode-btn.active {
      background: #222;
      color: white;
      border-color: #222;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 58px);
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-stable" class="mode-btn">安定版</button>
    <button id="btn-trial" class="mode-btn">試作版</button>
  </div>

  <iframe id="viewer"></iframe>

  <script>
    const viewer = document.getElementById("viewer");
    const btnStable = document.getElementById("btn-stable");
    const btnTrial = document.getElementById("btn-trial");

    const pages = {
      stable: "stable.html",
      trial: "trial.html"
    };

    function setActiveButton(mode) {
      btnStable.classList.toggle("active", mode === "stable");
      btnTrial.classList.toggle("active", mode === "trial");
    }

    function switchMode(mode, push = true) {
      if (!pages[mode]) return;

      viewer.src = pages[mode];
      setActiveButton(mode);

      if (push) {
        history.pushState({ mode }, "", `#${mode}`);
      }
    }

    btnStable.addEventListener("click", () => {
      switchMode("stable");
    });

    btnTrial.addEventListener("click", () => {
      switchMode("trial");
    });

    window.addEventListener("popstate", (event) => {
      const modeFromState = event.state?.mode;
      const modeFromHash = location.hash.replace("#", "");

      const mode = pages[modeFromState] ? modeFromState
                 : pages[modeFromHash] ? modeFromHash
                 : "stable";

      switchMode(mode, false);
    });

    const initialHash = location.hash.replace("#", "");
    const initialMode = pages[initialHash] ? initialHash : "stable";

    history.replaceState({ mode: initialMode }, "", `#${initialMode}`);
    switchMode(initialMode, false);
  </script>
</body>
</html>
