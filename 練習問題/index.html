<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>文字数カウンター</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
      padding: 10px;
    }

    .result {
      margin-top: 16px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>文字数カウンター</h1>

  <p>下の入力欄に文字を入力すると、文字数が表示されます。</p>

  <textarea id="textInput" placeholder="ここに文字を入力してください"></textarea>

  <div class="result">
    文字数：<span id="count">0</span>
  </div>

  <script>
    const textInput = document.querySelector('#textInput');
    const count = document.querySelector('#count');

    textInput.addEventListener('input', () => {
      count.textContent = textInput.value.length;
    });
  </script>
</body>
</html>
