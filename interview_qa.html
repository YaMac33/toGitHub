<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接想定Q&A 一問一答</title>
<style>
  :root {
    --ink: #14181f;
    --ink-soft: #46515e;
    --ink-faint: #7b8593;
    --paper: #f3f1ec;
    --card: #ffffff;
    --line: #e0dbd1;
    --line-soft: #ebe7df;
    --accent: #1f5f4f;
    --accent-soft: #e6efeb;
    --gold: #a8823a;
    --gold-soft: #f2ead9;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.8;
    padding: 26px 16px 80px;
    background-image:
      radial-gradient(circle at 10% 4%, rgba(31, 95, 79, 0.04), transparent 38%),
      radial-gradient(circle at 92% 96%, rgba(168, 130, 58, 0.04), transparent 40%);
  }

  .wrap { max-width: 700px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 22px; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.32em; color: var(--gold);
    font-weight: 700; text-transform: uppercase; margin-bottom: 9px;
  }
  h1 { font-size: clamp(20px, 5vw, 26px); font-weight: 800; letter-spacing: 0.02em; }
  .subtitle { font-size: 13px; color: var(--ink-soft); margin-top: 8px; }

  /* toolbar */
  .toolbar {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .tool-btn {
    font-family: inherit; font-size: 12.5px; font-weight: 600;
    padding: 8px 16px; border-radius: 100px;
    border: 1px solid var(--line); background: var(--card);
    color: var(--ink-soft); cursor: pointer; transition: all 0.18s ease;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* category groups */
  .cat-group { margin-bottom: 26px; }
  .cat-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; padding: 0 4px;
  }
  .cat-head .bar { width: 3px; height: 16px; background: var(--accent); border-radius: 2px; }
  .cat-head h2 { font-size: 14px; font-weight: 700; color: var(--accent); letter-spacing: 0.03em; }
  .cat-head .count { font-size: 11.5px; color: var(--ink-faint); font-weight: 600; }

  /* Q&A item */
  .qa {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .qa.open { border-color: var(--accent); box-shadow: 0 6px 22px -14px rgba(31, 95, 79, 0.5); }

  .q {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 16px 18px; cursor: pointer;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .q-num {
    flex-shrink: 0;
    font-size: 12px; font-weight: 800; color: var(--gold);
    background: var(--gold-soft); border-radius: 7px;
    min-width: 26px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px; font-variant-numeric: tabular-nums;
  }
  .q-text {
    flex: 1; font-size: 15px; font-weight: 700; color: var(--ink);
    line-height: 1.65;
  }
  .q-icon {
    flex-shrink: 0; width: 22px; height: 22px; margin-top: 2px;
    color: var(--ink-faint); transition: transform 0.3s ease, color 0.2s ease;
  }
  .qa.open .q-icon { transform: rotate(180deg); color: var(--accent); }

  .a-wrap {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .a-inner {
    padding: 2px 18px 18px 56px;
    border-top: 1px solid transparent;
  }
  .qa.open .a-inner { border-top-color: var(--line-soft); padding-top: 14px; }

  .a-text {
    font-size: 14px; line-height: 1.9; color: var(--ink-soft);
    white-space: pre-wrap;
  }
  .a-placeholder {
    font-size: 12.5px; color: var(--ink-faint); font-style: normal;
    display: flex; align-items: center; gap: 6px;
  }
  .note {
    margin-top: 14px; padding: 11px 13px;
    background: var(--gold-soft); border-radius: 9px;
    font-size: 12.5px; line-height: 1.7; color: #7a5e24;
  }
  .note b { font-weight: 700; }

  footer { text-align: center; margin-top: 30px; font-size: 11.5px; color: var(--ink-faint); }

  @media (max-width: 480px) {
    .a-inner { padding-left: 18px; }
    .q { padding: 14px 15px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .a-wrap { transition: none; }
    .q-icon { transition: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Interview Prep</div>
      <h1>面接想定Q&amp;A 一問一答</h1>
      <div class="subtitle">質問をタップすると回答が表示されます</div>
    </header>

    <div class="toolbar">
      <button class="tool-btn" id="openAll">すべて開く</button>
      <button class="tool-btn active" id="closeAll">すべて閉じる</button>
    </div>

    <div id="list"></div>

    <footer>デジタル庁 一次面接対策 ・ 7/11 17:00</footer>
  </div>

<script>
  const data = [
    { cat: "DXの本質・技術の位置づけ", items: [
      { q: "あなたが考えるDXの本質は何ですか?",
        a: "私は、DXの成否を最終的に分けるのは、システムそのものではなく、それを使う組織と人だと考えています。どれだけ優れたシステムを導入しても、職員の役割分担や業務フロー、組織の文化が変わらなければ定着しません。私自身、GASやクラウドの技術を独学で扱ってきましたが、それはあくまで“人と組織を動かすための手段”であり、目的ではないと捉えています。",
        note: "技術への言及は最後に一文だけ。主軸は人・組織であることを明確にする。" },
      { q: "標準化やBPRを進める上で、一番難しいのはどこだと思いますか?",
        a: "技術的な移行作業そのものよりも、現場の職員がその変化を前向きに受け入れ、自分たちの仕事の仕方を変える意思を持てるかどうかだと考えています。議会事務局で電子化の仕組みを試作した際も、技術的にできるかどうかより、関係する職員や議会側の事情をどう汲み、合意を作るかの方がはるかに難しいと実感しました。",
        note: "" },
      { q: "あなたの技術的なスキル(AWS資格など)は、この仕事にどう活きますか?",
        a: "私の技術的な知識は、自分が実装者になるためというよりは、技術者と行政職員の間で“翻訳者”として機能すると思っています。行政の制約や現場の事情を理解した上で、技術的な選択肢を的確に汲み取り、双方に分かりやすく伝えられることが、私の技術知識の一番の使い道だと考えています。",
        note: "技術力を聞かれても、必ず「人と組織をつなぐため」という文脈に着地させる。" }
    ]},
    { cat: "壁 → 制度設計側へ", items: [
      { q: "なぜ今の職場でその課題に取り組み続けないのですか?",
        a: "実は、この点は自分自身、今回の転職を考える上でも特に向き合った問いです。現場で解決策が見えていても、一自治体の職員という立場では、予算や組織文化、他部署との調整力といった制約の中でしか動けません。GASでの試作なども、環境や組織の壁から実運用に至らなかったものが複数あります。この経験を通じて、私は“現場の努力だけでは超えられない壁がある”と痛感しました。だからこそ、その壁の外側、つまり全国千七百の自治体に共通する前提そのものを設計する立場に身を置くことで、現場だけでは解決できない課題に、より本質的にアプローチできると考えるようになりました。",
        note: "聞かれる前に自分から「一番向き合った問い」として提示し、弱みの告白ではなく自己分析の深さとして機能させる。" },
      { q: "試作が実運用に至らなかったことについて、どう捉えていますか?",
        a: "率直に言うと、悔しさは今でもあります。ただ、その経験があったからこそ、“技術的に作れるかどうか”と“組織に定着するかどうか”は全く別の課題だと体で理解できました。この経験は、失敗というより、現場と制度の両方を知る立場としての土台になっていると捉えています。",
        note: "" },
      { q: "デジタル庁に入っても、同じように上長の承認や省庁間調整の壁にぶつかるのでは?",
        a: "おっしゃる通り、承認や調整のプロセス自体はデジタル庁でも同じだと理解しています。ただ違いは、個人の裁量の大小ではなく、その結果が及ぶ範囲です。現場でどれだけ良い設計をしても影響は一自治体に留まりますが、制度設計に関わることができれば、その成果は全国千七百自治体に共通する前提そのものになります。この“射程の違い”こそ、私が制度設計側を志望する理由です。",
        note: "射程・スコープの軸で返す。権限の有無で反論しないのがポイント。" }
    ]},
    { cat: "転職理由", items: [
      { q: "建築系から自治体へ転職した理由は?",
        a: "施工管理の現場では、ものづくりの面白さを感じる一方、体力的な負荷や不規則な勤務体系という現実にも直面しました。二級建築士として得た知見を、もっと長期的・安定的に地域や住民のために活かせる場はないかと考えたときに、市営住宅管理や空き家施策という、まさに建築の知見と行政サービスが直接つながる仕事に出会い、自治体職員への転職を決めました。",
        note: "" },
      { q: "なぜ技術職ではなく事務職を選んだのですか?",
        a: "学生時代からバレーボールに打ち込んでおり、全国大会出場の実績を通じて、習志野市の採用試験で経験者採用枠を利用できる機会がありました。技術職ではなく事務職での採用でしたが、行政の仕事に幅広く関わりながら地域に貢献できることに魅力を感じ、この枠での入庁を決めました。結果として、事務職でありながら二級建築士の資格を保有していたことが、その後の住宅課配属で、施設管理や住民対応の場面で知見として活きる場面もありました。採用枠自体が事務職での募集だったこと、また当時は施工管理の現場よりも、住民に近い立場で行政サービス全体に関わる仕事に関心が向いていたことが理由です。",
        note: "" },
      { q: "自治体からデジタル庁へ転職したい理由は?",
        a: "家庭環境も含めて自分の時間の使い方が変化する中で、これまで以上に仕事そのものに向き合う時間とエネルギーを持てる状況になりました。ちょうどそのタイミングで、2026年5月に庁内公募でDX推進担当に自ら立候補し、実際にBPRや標準化に関わる中で、この分野に強いやりがいを感じるようになりました。一自治体の中で得られる裁量には限界があると実感する中で、同じ課題意識をより大きな規模で追求できる場として、デジタル庁を志望するに至りました。",
        note: "" },
      { q: "なぜ2回も転職を?",
        a: "一貫しているのは、“その時々で自分が最大限力を発揮できる環境を選んできた”ということです。建築現場から自治体へは安定した環境で知見を活かすため、自治体からデジタル庁へは、今まさに仕事に全力を注げる状況にある中で、より大きな規模で課題解決に貢献するためです。",
        note: "" }
    ]},
    { cat: "他社選考との一貫性", items: [
      { q: "なぜコンサルではなくデジタル庁なのか? 複数社の選考は今どうなっているか?",
        a: "複数のコンサルティングファームの選考を並行して受けていたのは、一自治体の中で得た知見や課題意識を、より広い規模で活かしたいという思いが根底にあったからです。コンサルティングファームであれば、複数の自治体に横断的に関わることで、その規模の課題解決に携われると考えていました。一方で選考を進める中で、コンサルティングファームは基本的にクライアントである自治体からの委託を受けて動く立場であるのに対し、デジタル庁は制度・標準そのものを設計し、全国千七百を超える自治体に共通で適用される仕組みを作る立場です。同じ“広い規模で貢献したい”という思いを実現するにも、より川上から、公共の立場で関われるのがデジタル庁だと考え、最終的に第一志望としました。",
        note: "" },
      { q: "今、他の選考はどうなっていますか?",
        a: "現時点では、これまで並行して進めていた選考は一区切りついており、デジタル庁の選考に専念できる状況です。",
        note: "書類提出時(6/20)と面接時(7/11)で状況が変わっている点を自分から補足すると、後のズレとして扱われずに済む。" }
    ]},
    { cat: "技術への関心", items: [
      { q: "AWS CLFへの関心の源泉は?",
        a: "行政のデジタル化に関わる中で、GASやスプレッドシートを使った独学の業務改善を続けるうちに、コードやITの仕組みそのものに関心を持つようになりました。特に惹かれたのは、インフラという領域を、物理的な機器や現地作業ではなく、コードによって構築・保守・運用できるという発想、いわゆるIaC(Infrastructure as Code)の考え方です。この分野を体系的に理解したいと考え、まずAWS Certified Cloud Practitionerを取得しました。その後、この関心は自然と、ガバメントクラウドやLGWAN環境下でのクラウド活用、kintoneのようなノーコードツールとの連携といった、実際の自治体業務に直結するテーマへと広がっていきました。自分自身がコードを専門に書く立場になることは目指していませんが、インフラや技術の構造を理解していることで、ベンダーや技術者との会話を“翻訳”し、行政側の要件を的確に伝えられる。これが、標準化やガバメントクラウド移行という技術と行政が交差する領域で、大きな武器になると考えています。",
        note: "" },
      { q: "なぜAWSなのか?",
        a: "ガバメントクラウドの採用実績(AWS・Azure・GCP・OCIが認定)を踏まえ、まず市場シェアの大きいAWSから体系的に学びました。",
        note: "" }
    ]}
  ];

  const chevron = '<svg class="q-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
  const eyeIcon = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';

  const list = document.getElementById("list");
  let counter = 0;

  data.forEach(group => {
    const g = document.createElement("div");
    g.className = "cat-group";
    const head = document.createElement("div");
    head.className = "cat-head";
    head.innerHTML = `<span class="bar"></span><h2>${group.cat}</h2><span class="count">${group.items.length}問</span>`;
    g.appendChild(head);

    group.items.forEach(item => {
      counter++;
      const num = String(counter).padStart(2, "0");
      const qa = document.createElement("div");
      qa.className = "qa";

      const noteHtml = item.note ? `<div class="note"><b>狙い：</b>${item.note}</div>` : "";

      qa.innerHTML = `
        <div class="q">
          <span class="q-num">${num}</span>
          <span class="q-text">${item.q}</span>
          ${chevron}
        </div>
        <div class="a-wrap">
          <div class="a-inner">
            <div class="a-text">${item.a}</div>
            ${noteHtml}
          </div>
        </div>`;

      const q = qa.querySelector(".q");
      const wrap = qa.querySelector(".a-wrap");
      q.addEventListener("click", () => {
        const isOpen = qa.classList.toggle("open");
        wrap.style.maxHeight = isOpen ? wrap.scrollHeight + "px" : "0";
      });
      g.appendChild(qa);
    });
    list.appendChild(g);
  });

  function setAll(open) {
    document.querySelectorAll(".qa").forEach(qa => {
      const wrap = qa.querySelector(".a-wrap");
      qa.classList.toggle("open", open);
      wrap.style.maxHeight = open ? wrap.scrollHeight + "px" : "0";
    });
    document.getElementById("openAll").classList.toggle("active", open);
    document.getElementById("closeAll").classList.toggle("active", !open);
  }
  document.getElementById("openAll").addEventListener("click", () => setAll(true));
  document.getElementById("closeAll").addEventListener("click", () => setAll(false));
</script>
</body>
</html>
