<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行程一覧</title>
  <link rel="stylesheet" href="./vendor/tabulator/tabulator.min.css" />
  <link rel="stylesheet" href="./style.css" />
  <script src="./data/itinerary.js"></script>
  <script src="./vendor/tabulator/tabulator.min.js"></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div class="header-main">
        <div class="header-copy">
          <p class="eyebrow">Offline Tabulator Viewer</p>
          <h1 id="pageTitle" class="page-title">行程一覧</h1>
          <p id="pageSubtitle" class="page-subtitle" hidden></p>
        </div>

        <div class="header-actions no-print">
          <button id="clearFiltersButton" type="button" class="ghost-button">
            絞り込み解除
          </button>
          <button id="printButton" type="button" class="print-button">
            印刷
          </button>
        </div>
      </div>

      <div class="header-meta">
        <p id="metaPeriod" class="meta-line" hidden></p>
        <p id="metaParticipants" class="meta-line" hidden></p>
        <p id="metaNote" class="meta-line" hidden></p>
      </div>
    </header>

    <section id="overview" class="overview" hidden></section>

    <section class="controls no-print" aria-label="一覧の絞り込み">
      <div class="control-group control-group-search">
        <label class="control-label" for="searchInput">キーワード検索</label>
        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="内容・詳細・備考を検索"
        />
      </div>

      <div class="control-group">
        <span class="control-label">区分</span>
        <div id="categoryFilters" class="filter-chips"></div>
      </div>
    </section>

    <section class="table-shell">
      <div class="table-shell__header">
        <div>
          <h2 class="table-title">行程一覧表</h2>
          <p id="tableStatus" class="table-status">0 件を表示</p>
        </div>
      </div>

      <div id="app" class="app" aria-live="polite">
        <div id="table" class="table-host"></div>
      </div>
    </section>
  </div>
</body>
</html>
