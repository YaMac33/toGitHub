<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会議室予約表</title>
  <script src="./reservations.js"></script>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --line: #d7dbe2;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --sat-bg: #eff6ff;
      --sun-bg: #fef2f2;
      --danger: #b91c1c;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);

      --label-single-bg: #eef2ff;
      --label-single-text: #3730a3;

      --label-start-bg: #dcfce7;
      --label-start-text: #166534;

      --label-continue-bg: #f3f4f6;
      --label-continue-text: #374151;

      --label-end-bg: #fee2e2;
      --label-end-text: #991b1b;

      --status-approved-bg: #ecfdf5;
      --status-approved-text: #166534;

      --status-pending-bg: #fff7ed;
      --status-pending-text: #9a3412;

      --status-rejected-bg: #fef2f2;
      --status-rejected-text: #991b1b;

      --status-cancelled-bg: #f3f4f6;
      --status-cancelled-text: #4b5563;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 20px;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
    }

    .header-card,
    .table-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .header-card {
      padding: 20px;
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.3;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .month-label {
      min-width: 220px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      color: #fff;
      opacity: 0.92;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .field select {
      min-width: 140px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }

    .table-card {
      overflow: hidden;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1100px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f3f4f6;
      color: #111827;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 10px;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      text-align: center;
      vertical-align: middle;
    }

    thead th:first-child {
      min-width: 130px;
    }

    thead th:not(:first-child) {
      min-width: 250px;
    }

    tbody td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      background: #fff;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody td:last-child,
    thead th:last-child {
      border-right: none;
    }

    .date-cell {
      padding: 14px 10px;
      text-align: center;
      background: #fafafa;
      white-space: nowrap;
    }

    .date-main {
      font-weight: 700;
      font-size: 16px;
      color: #111827;
    }

    .date-sub {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .is-saturday .date-cell,
    .is-saturday .room-cell {
      background: var(--sat-bg);
    }

    .is-sunday .date-cell,
    .is-sunday .room-cell {
      background: var(--sun-bg);
    }

    .room-cell {
      padding: 10px;
    }

    .room-click {
      display: block;
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      padding: 0;
      margin: 0;
      text-align: left;
      cursor: pointer;
      border-radius: 12px;
    }

    .room-click:hover .room-stack {
      border-color: var(--accent);
    }

    .room-stack {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.88);
      min-height: 168px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .room-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 10px 9px;
      background: #fff;
      line-height: 1.45;
      word-break: break-word;
    }

    .room-item-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .kind-badge,
    .status-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.4;
    }

    .kind-single {
      background: var(--label-single-bg);
      color: var(--label-single-text);
    }

    .kind-start {
      background: var(--label-start-bg);
      color: var(--label-start-text);
    }

    .kind-continue {
      background: var(--label-continue-bg);
      color: var(--label-continue-text);
    }

    .kind-end {
      background: var(--label-end-bg);
      color: var(--label-end-text);
    }

    .status-approved {
      background: var(--status-approved-bg);
      color: var(--status-approved-text);
    }

    .status-pending {
      background: var(--status-pending-bg);
      color: var(--status-pending-text);
    }

    .status-rejected {
      background: var(--status-rejected-bg);
      color: var(--status-rejected-text);
    }

    .status-cancelled {
      background: var(--status-cancelled-bg);
      color: var(--status-cancelled-text);
    }

    .room-item-title {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
    }

    .room-item-sub {
      font-size: 12px;
      color: #374151;
    }

    .room-item-note {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .slot-empty {
      font-size: 12px;
      color: #9ca3af;
      align-self: start;
    }

    .empty-message {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 14px 20px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-pill {
      display: inline-block;
      min-width: 36px;
      text-align: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #fff;
      color: #374151;
    }

    .legend-sat,
    .legend-sun {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid var(--line);
    }

    .legend-sat {
      background: var(--sat-bg);
    }

    .legend-sun {
      background: var(--sun-bg);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 9999;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.28);
      border: 1px solid var(--line);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title-wrap h2 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.3;
    }

    .modal-subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    .icon-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .modal-body {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .detail-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .detail-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .detail-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.4;
    }

    .detail-meta {
      display: grid;
      gap: 4px;
      font-size: 14px;
      color: #374151;
    }

    .detail-meta strong {
      color: #111827;
    }

    .modal-empty {
      color: var(--empty);
      font-size: 14px;
    }

    .footer-actions {
      padding: 0 20px 20px;
      display: flex;
      justify-content: flex-end;
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      .header-card {
        padding: 16px;
      }

      .page-title {
        font-size: 24px;
      }

      .month-label {
        min-width: auto;
        font-size: 18px;
      }

      thead th:not(:first-child) {
        min-width: 210px;
      }

      .room-stack {
        min-height: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="header-card">
      <h1 class="page-title">会議室予約表</h1>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="month-nav">
            <button type="button" class="btn" id="prev-month-btn">＜前月</button>
            <div class="month-label" id="month-label">----</div>
            <button type="button" class="btn" id="next-month-btn">翌月＞</button>
          </div>

          <button type="button" class="btn" id="today-btn">今月へ戻る</button>
        </div>

        <div class="toolbar-right">
          <label class="field">
            <span>状態</span>
            <select id="status-filter">
              <option value="承認済">承認済</option>
              <option value="申請中">申請中</option>
              <option value="却下">却下</option>
              <option value="キャンセル">キャンセル</option>
              <option value="all">すべて</option>
            </select>
          </label>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-pill kind-start">開始</span>
          <span>開始日</span>
        </div>
        <div class="legend-item">
          <span class="legend-pill kind-continue">継続</span>
          <span>期間中</span>
        </div>
        <div class="legend-item">
          <span class="legend-pill kind-end">終了</span>
          <span>終了日</span>
        </div>
        <div class="legend-item">
          <span class="legend-pill kind-single">当日</span>
          <span>単日予約</span>
        </div>
        <div class="legend-item">
          <span class="legend-sat"></span>
          <span>土曜</span>
        </div>
        <div class="legend-item">
          <span class="legend-sun"></span>
          <span>日曜</span>
        </div>
        <div class="legend-item">
          <span>セルをクリックすると詳細を表示</span>
        </div>
      </div>
    </section>

    <section class="table-card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>委員会室</th>
              <th>小委員会室</th>
              <th>部課長控室</th>
              <th>小会議室</th>
            </tr>
          </thead>
          <tbody id="reservation-body"></tbody>
        </table>
      </div>
      <div class="empty-message" id="empty-message" hidden>この条件に該当する予約はありません。</div>
    </section>
  </div>

  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <h2 id="modal-title">予約詳細</h2>
          <div class="modal-subtitle" id="modal-subtitle"></div>
        </div>
        <button type="button" class="icon-btn" id="modal-close-btn" aria-label="閉じる">×</button>
      </div>

      <div class="modal-body" id="modal-body"></div>

      <div class="footer-actions">
        <button type="button" class="btn btn-primary" id="modal-close-footer-btn">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const ROOM_NAMES = ["委員会室", "小委員会室", "部課長控室", "小会議室"];
      const WEEKDAY_LABELS = ["日", "月", "火", "水", "木", "金", "土"];

      const state = {
        currentYear: 0,
        currentMonth: 0,
        statusFilter: "承認済"
      };

      const bodyEl = document.getElementById("reservation-body");
      const emptyMessageEl = document.getElementById("empty-message");
      const monthLabelEl = document.getElementById("month-label");
      const statusFilterEl = document.getElementById("status-filter");

      const modalOverlayEl = document.getElementById("modal-overlay");
      const modalTitleEl = document.getElementById("modal-title");
      const modalSubtitleEl = document.getElementById("modal-subtitle");
      const modalBodyEl = document.getElementById("modal-body");

      const allReservations = Array.isArray(window.APP_DATA && window.APP_DATA.reservations)
        ? window.APP_DATA.reservations.slice()
        : [];

      init();

      function init() {
        const initialDate = getInitialMonthDate();
        state.currentYear = initialDate.getFullYear();
        state.currentMonth = initialDate.getMonth();

        document.getElementById("prev-month-btn").addEventListener("click", handlePrevMonth);
        document.getElementById("next-month-btn").addEventListener("click", handleNextMonth);
        document.getElementById("today-btn").addEventListener("click", handleTodayMonth);

        statusFilterEl.addEventListener("change", function () {
          state.statusFilter = statusFilterEl.value;
          render();
        });

        document.getElementById("modal-close-btn").addEventListener("click", closeModal);
        document.getElementById("modal-close-footer-btn").addEventListener("click", closeModal);

        modalOverlayEl.addEventListener("click", function (event) {
          if (event.target === modalOverlayEl) {
            closeModal();
          }
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape" && modalOverlayEl.classList.contains("is-open")) {
            closeModal();
          }
        });

        render();
      }

      function getInitialMonthDate() {
        const firstValid = allReservations.find(function (item) {
          return isValidDateString(item.start_date);
        });

        if (firstValid) {
          return parseDateString(firstValid.start_date);
        }

        return new Date();
      }

      function handlePrevMonth() {
        state.currentMonth -= 1;
        normalizeCurrentMonth();
        render();
      }

      function handleNextMonth() {
        state.currentMonth += 1;
        normalizeCurrentMonth();
        render();
      }

      function handleTodayMonth() {
        const now = new Date();
        state.currentYear = now.getFullYear();
        state.currentMonth = now.getMonth();
        render();
      }

      function normalizeCurrentMonth() {
        while (state.currentMonth < 0) {
          state.currentMonth += 12;
          state.currentYear -= 1;
        }
        while (state.currentMonth > 11) {
          state.currentMonth -= 12;
          state.currentYear += 1;
        }
      }

      function render() {
        const wareki = getWareki(state.currentYear);
        monthLabelEl.textContent = wareki + "(" + state.currentYear + "年)" + (state.currentMonth + 1) + "月";

        bodyEl.innerHTML = "";

        const days = getDaysInMonth(state.currentYear, state.currentMonth);
        const reservationsForView = filterReservationsForCurrentView();

        for (let day = 1; day <= days; day += 1) {
          const dateObj = new Date(state.currentYear, state.currentMonth, day);
          const dateStr = toDateString(dateObj);
          bodyEl.appendChild(buildRow(dateObj, dateStr, reservationsForView));
        }

        emptyMessageEl.hidden = reservationsForView.length > 0;
      }

      function filterReservationsForCurrentView() {
        const firstDay = new Date(state.currentYear, state.currentMonth, 1);
        const lastDay = new Date(state.currentYear, state.currentMonth + 1, 0);
        const firstStr = toDateString(firstDay);
        const lastStr = toDateString(lastDay);

        return allReservations.filter(function (item) {
          if (!isValidDateString(item.start_date) || !isValidDateString(item.end_date)) {
            return false;
          }

          if (state.statusFilter !== "all" && String(item.status || "") !== state.statusFilter) {
            return false;
          }

          const start = String(item.start_date || "");
          const end = String(item.end_date || "");

          return !(end < firstStr || start > lastStr);
        });
      }

      function buildRow(dateObj, dateStr, reservations) {
        const tr = document.createElement("tr");

        if (dateObj.getDay() === 6) {
          tr.classList.add("is-saturday");
        } else if (dateObj.getDay() === 0) {
          tr.classList.add("is-sunday");
        }

        const dateTd = document.createElement("td");
        dateTd.className = "date-cell";
        dateTd.innerHTML =
          '<div class="date-main">' + escapeHtml((dateObj.getMonth() + 1) + "/" + dateObj.getDate() + "（" + WEEKDAY_LABELS[dateObj.getDay()] + "）") + '</div>' +
          '<div class="date-sub">' + escapeHtml(dateStr) + '</div>';
        tr.appendChild(dateTd);

        ROOM_NAMES.forEach(function (roomName) {
          const td = document.createElement("td");
          td.className = "room-cell";

          const roomReservations = reservations
            .filter(function (item) {
              return String(item.room_name || "") === roomName && isReservationActiveOnDate(item, dateStr);
            })
            .map(function (item) {
              return buildDisplayReservation(item, dateStr);
            });

          td.appendChild(buildRoomCellButton(dateStr, roomName, roomReservations));
          tr.appendChild(td);
        });

        return tr;
      }

      function buildRoomCellButton(dateStr, roomName, roomReservations) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "room-click";
        button.addEventListener("click", function () {
          openModal(dateStr, roomName, roomReservations);
        });

        const wrapper = document.createElement("div");
        wrapper.className = "room-stack";

        if (roomReservations.length === 0) {
          const empty = document.createElement("div");
          empty.className = "slot-empty";
          empty.textContent = "（なし）";
          wrapper.appendChild(empty);
        } else {
          sortDisplayReservations(roomReservations).forEach(function (item) {
            wrapper.appendChild(buildRoomItem(item));
          });
        }

        button.appendChild(wrapper);
        return button;
      }

      function buildRoomItem(item) {
        const card = document.createElement("div");
        card.className = "room-item";

        const head = document.createElement("div");
        head.className = "room-item-head";

        const kindBadge = document.createElement("span");
        kindBadge.className = "kind-badge " + getKindClass(item.displayKind);
        kindBadge.textContent = getKindLabel(item.displayKind);
        head.appendChild(kindBadge);

        if (state.statusFilter === "all") {
          const statusBadge = document.createElement("span");
          statusBadge.className = "status-badge " + getStatusClass(item.status);
          statusBadge.textContent = item.status || "";
          head.appendChild(statusBadge);
        }

        card.appendChild(head);

        const title = document.createElement("div");
        title.className = "room-item-title";
        title.textContent = item.purpose || "";
        card.appendChild(title);

        const sub = document.createElement("div");
        sub.className = "room-item-sub";
        sub.textContent = item.displayTimeText;
        card.appendChild(sub);

        if (item.note) {
          const note = document.createElement("div");
          note.className = "room-item-note";
          note.textContent = "※" + item.note;
          card.appendChild(note);
        }

        return card;
      }

      function openModal(dateStr, roomName, roomReservations) {
        const sorted = sortDisplayReservations(roomReservations);

        modalTitleEl.textContent = roomName;
        modalSubtitleEl.textContent = dateStr;
        modalBodyEl.innerHTML = "";

        if (sorted.length === 0) {
          const empty = document.createElement("div");
          empty.className = "modal-empty";
          empty.textContent = "予約はありません。";
          modalBodyEl.appendChild(empty);
        } else {
          sorted.forEach(function (item) {
            modalBodyEl.appendChild(buildDetailCard(item));
          });
        }

        modalOverlayEl.classList.add("is-open");
        modalOverlayEl.setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        modalOverlayEl.classList.remove("is-open");
        modalOverlayEl.setAttribute("aria-hidden", "true");
      }

      function buildDetailCard(item) {
        const card = document.createElement("div");
        card.className = "detail-card";

        const head = document.createElement("div");
        head.className = "detail-head";

        const kindBadge = document.createElement("span");
        kindBadge.className = "kind-badge " + getKindClass(item.displayKind);
        kindBadge.textContent = getKindLabel(item.displayKind);
        head.appendChild(kindBadge);

        const statusBadge = document.createElement("span");
        statusBadge.className = "status-badge " + getStatusClass(item.status);
        statusBadge.textContent = item.status || "";
        head.appendChild(statusBadge);

        card.appendChild(head);

        const title = document.createElement("h3");
        title.className = "detail-title";
        title.textContent = item.purpose || "";
        card.appendChild(title);

        const meta = document.createElement("div");
        meta.className = "detail-meta";
        meta.innerHTML =
          '<div><strong>表示:</strong> ' + escapeHtml(item.displayTimeText) + '</div>' +
          '<div><strong>期間:</strong> ' + escapeHtml(item.start_date + " ～ " + item.end_date) + '</div>' +
          '<div><strong>終日:</strong> ' + escapeHtml(String(item.is_all_day) === "1" ? "終日" : "時間指定") + '</div>' +
          '<div><strong>部署:</strong> ' + escapeHtml(String(item.department_name || "")) + '</div>' +
          '<div><strong>担当者:</strong> ' + escapeHtml(String(item.person_in_charge || "")) + '</div>' +
          '<div><strong>入力者:</strong> ' + escapeHtml(String(item.entered_by || "")) + '</div>' +
          '<div><strong>表示順:</strong> ' + escapeHtml(String(item.display_order || "")) + '</div>' +
          '<div><strong>備考:</strong> ' + escapeHtml(String(item.note || "なし")) + '</div>' +
          '<div><strong>作成日:</strong> ' + escapeHtml(String(item.created_at || "")) + '</div>' +
          '<div><strong>更新日:</strong> ' + escapeHtml(String(item.updated_at || "")) + '</div>';
        card.appendChild(meta);

        return card;
      }

      function isReservationActiveOnDate(item, dateStr) {
        const start = String(item.start_date || "");
        const end = String(item.end_date || "");
        return start <= dateStr && dateStr <= end;
      }

      function buildDisplayReservation(item, dateStr) {
        const start = String(item.start_date || "");
        const end = String(item.end_date || "");
        const isAllDay = Number(item.is_all_day) === 1;

        let displayKind = "single";
        if (start === end) {
          displayKind = "single";
        } else if (dateStr === start) {
          displayKind = "start";
        } else if (dateStr === end) {
          displayKind = "end";
        } else {
          displayKind = "continue";
        }

        return Object.assign({}, item, {
          displayKind: displayKind,
          displayTimeText: buildDisplayTimeText(item, displayKind)
        });
      }

      function buildDisplayTimeText(item, displayKind) {
        const startTime = String(item.start_time || "").trim();
        const endTime = String(item.end_time || "").trim();
        const isAllDay = Number(item.is_all_day) === 1;
        const sameDay = String(item.start_date || "") === String(item.end_date || "");

        if (sameDay) {
          if (isAllDay) return "終日";
          if (startTime && endTime) return startTime + "-" + endTime;
          if (startTime) return startTime + "開始";
          if (endTime) return endTime + "終了";
          return "時間指定";
        }

        if (isAllDay) {
          if (displayKind === "start") return "開始日";
          if (displayKind === "continue") return "継続中";
          if (displayKind === "end") return "終了日";
          return "終日";
        }

        if (displayKind === "start") {
          return startTime ? startTime + "開始" : "開始日";
        }
        if (displayKind === "continue") {
          return "終日";
        }
        if (displayKind === "end") {
          return endTime ? endTime + "終了" : "終了日";
        }

        if (startTime && endTime) return startTime + "-" + endTime;
        return "時間指定";
      }

      function sortDisplayReservations(items) {
        return items.slice().sort(function (a, b) {
          const orderA = toNumber(a.display_order, 9999);
          const orderB = toNumber(b.display_order, 9999);
          if (orderA !== orderB) return orderA - orderB;

          const kindA = kindSortValue(a.displayKind);
          const kindB = kindSortValue(b.displayKind);
          if (kindA !== kindB) return kindA - kindB;

          const purposeA = String(a.purpose || "");
          const purposeB = String(b.purpose || "");
          return purposeA.localeCompare(purposeB, "ja");
        });
      }

      function kindSortValue(kind) {
        if (kind === "start") return 1;
        if (kind === "continue") return 2;
        if (kind === "end") return 3;
        return 0;
      }

      function getKindLabel(kind) {
        if (kind === "start") return "開始";
        if (kind === "continue") return "継続";
        if (kind === "end") return "終了";
        return "当日";
      }

      function getKindClass(kind) {
        if (kind === "start") return "kind-start";
        if (kind === "continue") return "kind-continue";
        if (kind === "end") return "kind-end";
        return "kind-single";
      }

      function getStatusClass(status) {
        if (status === "承認済") return "status-approved";
        if (status === "申請中") return "status-pending";
        if (status === "却下") return "status-rejected";
        if (status === "キャンセル") return "status-cancelled";
        return "";
      }

      function getDaysInMonth(year, monthIndex) {
        return new Date(year, monthIndex + 1, 0).getDate();
      }

      function toDateString(dateObj) {
        const year = dateObj.getFullYear();
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        const day = String(dateObj.getDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
      }

      function isValidDateString(value) {
        return /^\d{4}-\d{2}-\d{2}$/.test(String(value || ""));
      }

      function parseDateString(value) {
        const parts = String(value).split("-");
        return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
      }

      function toNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function getWareki(year) {
        if (year >= 2019) {
          const w = year - 2018;
          return w === 1 ? "令和元年" : "令和" + w + "年";
        }
        if (year >= 1989) {
          const w = year - 1988;
          return w === 1 ? "平成元年" : "平成" + w + "年";
        }
        if (year >= 1926) {
          const w = year - 1925;
          return w === 1 ? "昭和元年" : "昭和" + w + "年";
        }
        return year + "年";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
    })();
  </script>
</body>
</html>
