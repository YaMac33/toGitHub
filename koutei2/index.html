<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行程表</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./data/itinerary.js"></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div class="header-main">
        <div class="header-copy">
          <h1 id="pageTitle" class="page-title">行程表</h1>
          <p id="pageSubtitle" class="page-subtitle" hidden></p>
        </div>

        <button type="button" onclick="window.print()" class="print-button no-print">
          印刷
        </button>
      </div>

      <div class="header-meta">
        <p id="metaPeriod" class="meta-line" hidden></p>
        <p id="metaParticipants" class="meta-line" hidden></p>
        <p id="metaNote" class="meta-line" hidden></p>
      </div>
    </header>

    <main id="app" class="app"></main>
  </div>
</body>
</html>
