<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stable</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f7f8fa;
      color: #222;
      font-family: sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .page-desc {
      margin: 0;
      color: #555;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .status-line {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 220px 220px;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: bold;
    }

    .field input,
    .field select {
      height: 38px;
      padding: 0 10px;
      border: 1px solid #c8d0db;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .main-split {
      display: grid;
      grid-template-columns: minmax(320px, 42%) minmax(420px, 58%);
      gap: 16px;
      align-items: stretch;
      min-height: 70vh;
    }

    .pane-card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      min-height: 70vh;
      overflow: hidden;
    }

    .pane-header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid #edf1f5;
      flex: 0 0 auto;
    }

    .pane-title {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .result-meta {
      font-size: 14px;
      color: #555;
    }

    .left-pane-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .right-pane-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
    }

    .result-table-wrap {
      overflow-x: auto;
      padding-top: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #e5e9ef;
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f2f5f9;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccd5df;
      border-radius: 10px;
      background: #fafbfc;
    }

    .empty-small {
      color: #666;
      font-size: 14px;
      padding: 4px 0;
    }

    .clickable-row {
      cursor: pointer;
    }

    .clickable-row:hover {
      background: #f8fbff;
    }

    .selected-row {
      background: #eef6ff;
    }

    .detail-header {
      margin-bottom: 12px;
    }

    .detail-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .detail-subtitle {
      font-size: 13px;
      color: #666;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 10px;
      padding: 12px;
      box-sizing: border-box;
    }

    .detail-card-wide {
      grid-column: 1 / -1;
    }

    .detail-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .history-row {
      padding: 8px 0;
      border-bottom: 1px solid #edf1f5;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .history-row:last-child {
      border-bottom: 0;
    }

    @media (max-width: 1000px) {
      .main-split {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .pane-card {
        min-height: auto;
      }

      .left-pane-body,
      .right-pane-body {
        min-height: auto;
        max-height: none;
        overflow: visible;
      }
    }

    @media (max-width: 800px) {
      .search-row {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 class="page-title">議員管理システム stable</h1>
      <p class="page-desc">左で選択、右で詳細確認を行う画面です。</p>
    </header>

    <section class="card">
      <h2>動作確認</h2>
      <div id="statusBox" class="status-line">読み込み中...</div>
    </section>

    <section class="card">
      <h2>検索条件</h2>
      <div class="search-row">
        <div class="field">
          <label for="searchName">議員名</label>
          <input id="searchName" type="text" placeholder="例: 山田" />
        </div>

        <div class="field">
          <label for="searchParty">会派</label>
          <select id="searchParty"></select>
        </div>

        <div class="field">
          <label for="searchCommittee">現在委員会</label>
          <select id="searchCommittee"></select>
        </div>
      </div>
    </section>

    <section class="main-split">
      <section class="pane-card">
        <div class="pane-header">
          <h2 class="pane-title">議員一覧</h2>
          <div id="resultMeta" class="result-meta">0件</div>
        </div>
        <div class="left-pane-body">
          <div id="resultArea"></div>
        </div>
      </section>

      <section class="pane-card">
        <div class="pane-header">
          <h2 class="pane-title">詳細</h2>
        </div>
        <div id="detailArea" class="right-pane-body">
          <div class="empty">一覧から議員を選択すると詳細を表示します。</div>
        </div>
      </section>
    </section>
  </div>

  <script src="data/members.js"></script>
  <script src="data/office_terms.js"></script>
  <script src="data/parties.js"></script>
  <script src="data/member_parties.js"></script>
  <script src="data/committees.js"></script>
  <script src="data/member_committees.js"></script>
  <script src="data/councils.js"></script>
  <script src="data/member_councils.js"></script>
  <script src="data/contacts.js"></script>
  <script src="data/change_logs.js"></script>
  <script src="data/codes.js"></script>

  <script src="app.js"></script>
  <script src="view_stable.js"></script>
</body>
</html>
