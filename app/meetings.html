<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meetings</title>
  <style>
    body { font-family: sans-serif; margin: 20px; background:#f7f8fa; }
    h1 { margin-bottom: 10px; }

    .layout {
      display: grid;
      grid-template-columns: 35% 65%;
      gap: 16px;
    }

    .card {
      background:#fff;
      border:1px solid #ddd;
      border-radius:10px;
      padding:12px;
    }

    .row {
      padding:8px;
      border-bottom:1px solid #eee;
      cursor:pointer;
    }

    .row:hover { background:#f0f6ff; }
    .selected { background:#e6f0ff; }

    .section { margin-bottom: 16px; }
    .title { font-weight:bold; margin-bottom:6px; }

    .pill {
      display:inline-block;
      padding:2px 6px;
      border:1px solid #ccc;
      border-radius:6px;
      margin:2px;
      font-size:12px;
    }
  </style>
</head>
<body>

<h1>議会回・委員会ビュー</h1>

<div class="layout">
  <div class="card">
    <h2>会議回一覧</h2>
    <div id="list"></div>
  </div>

  <div class="card">
    <h2>詳細</h2>
    <div id="detail">左から選択してください</div>
  </div>
</div>

<script src="data/members.js"></script>
<script src="data/committees.js"></script>
<script src="data/meetings.js"></script>
<script src="data/event_types.js"></script>
<script src="data/events.js"></script>
<script src="data/special_committees.js"></script>
<script src="data/special_committee_instances.js"></script>
<script src="data/special_committee_meetings.js"></script>
<script src="data/special_committee_members.js"></script>

<script src="view_meetings.js"></script>

</body>
</html>
