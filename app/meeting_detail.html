<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meeting_detail</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f7f8fa;
      color: #222;
      font-family: sans-serif;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 10px;
      color: #1457b8;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .page-desc {
      margin: 0;
      color: #555;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .status-line {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-item {
      padding: 10px 12px;
      border: 1px solid #e5e9ef;
      border-radius: 10px;
      background: #fbfcfd;
      font-size: 14px;
      line-height: 1.6;
    }

    .summary-item-wide {
      grid-column: 1 / -1;
    }

    .summary-label {
      font-weight: bold;
      color: #444;
      margin-right: 6px;
    }

    .link-line a {
      color: #1457b8;
      text-decoration: none;
    }

    .link-line a:hover {
      text-decoration: underline;
    }

    .calendar-month {
      margin-bottom: 20px;
    }

    .calendar-month:last-child {
      margin-bottom: 0;
    }

    .calendar-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .weekday-head {
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      color: #555;
      padding: 6px 0;
    }

    .calendar-cell {
      min-height: 120px;
      border: 1px solid #dfe5ec;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .calendar-cell.outside {
      background: #f3f5f7;
      color: #999;
    }

    .calendar-cell.in-term {
      border-color: #b9d0f3;
      background: #f8fbff;
    }

    .calendar-cell.has-events {
      cursor: pointer;
    }

    .calendar-cell.has-events:hover {
      background: #eef6ff;
      border-color: #8fb4ea;
    }

    .calendar-day {
      font-size: 13px;
      font-weight: bold;
    }

    .calendar-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .calendar-item {
      font-size: 12px;
      line-height: 1.4;
      border-radius: 8px;
      padding: 4px 6px;
      background: #eef3f8;
      word-break: break-word;
    }

    .calendar-item.plenary {
      background: #e8f3ff;
    }

    .calendar-item.steering {
      background: #fff4dd;
    }

    .calendar-item.leaders {
      background: #f4eefe;
    }

    .calendar-item.standing {
      background: #eef8ea;
    }

    .calendar-item.special {
      background: #fdeef0;
    }

    .calendar-more {
      font-size: 12px;
      color: #555;
      padding: 2px 4px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .detail-subcard {
      border: 1px solid #e5e9ef;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }

    .detail-subcard h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .history-row {
      padding: 8px 0;
      border-bottom: 1px solid #edf1f5;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .history-row:last-child {
      border-bottom: 0;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccd5df;
      border-radius: 10px;
      background: #fafbfc;
    }

    .empty-small {
      color: #666;
      font-size: 14px;
      padding: 4px 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      z-index: 999;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(720px, 100%);
      max-height: 80vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      border: 1px solid #d6dde7;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #e7edf4;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
    }

    .modal-close {
      border: 1px solid #cbd6e2;
      background: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .modal-close:hover {
      background: #f5f8fb;
    }

    .modal-body {
      padding: 16px;
    }

    .modal-item {
      border: 1px solid #e5e9ef;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #fbfcfd;
    }

    .modal-item:last-child {
      margin-bottom: 0;
    }

    .modal-item-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .modal-item-note {
      color: #555;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .calendar-cell {
        min-height: 100px;
      }
    }

    @media (max-width: 900px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .calendar-grid {
        grid-template-columns: repeat(7, minmax(90px, 1fr));
        overflow-x: auto;
      }
    }

    @media (max-width: 700px) {
      .page {
        padding: 14px;
      }

      .calendar-cell {
        min-height: 90px;
        padding: 6px;
      }

      .calendar-item {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <a href="meetings.html" class="back-link">← 会議回一覧へ戻る</a>
      <h1 id="pageTitle" class="page-title">会議回詳細</h1>
      <p id="pageDesc" class="page-desc">会議回の詳細を表示します。</p>
    </header>

    <section class="card">
      <h2>動作確認</h2>
      <div id="statusBox" class="status-line">読み込み中...</div>
    </section>

    <section class="card">
      <h2>会議回概要</h2>
      <div id="summaryArea" class="summary-grid"></div>
    </section>

    <section class="card">
      <h2>月間カレンダー</h2>
      <div id="calendarArea"></div>
    </section>

    <section class="card">
      <h2>特別委員会</h2>
      <div id="specialCommitteeArea" class="detail-grid"></div>
    </section>
  </div>

  <div id="dayModalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div id="dayModalTitle" class="modal-title">日別詳細</div>
        <button id="dayModalClose" class="modal-close" type="button">閉じる</button>
      </div>
      <div id="dayModalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="data/members.js"></script>
  <script src="data/committees.js"></script>
  <script src="data/meetings.js"></script>
  <script src="data/event_types.js"></script>
  <script src="data/events.js"></script>
  <script src="data/special_committees.js"></script>
  <script src="data/special_committee_instances.js"></script>
  <script src="data/special_committee_meetings.js"></script>
  <script src="data/special_committee_members.js"></script>

  <script src="view_meeting_detail.js"></script>
</body>
</html>
