<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stable</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f7f8fa;
      color: #222;
      font-family: sans-serif;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .page-desc {
      margin: 0;
      color: #555;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .status-line {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 220px 140px;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: bold;
    }

    .field input,
    .field select {
      height: 38px;
      padding: 0 10px;
      border: 1px solid #c8d0db;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .result-meta {
      margin-bottom: 10px;
      font-size: 14px;
      color: #555;
    }

    .result-table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #e5e9ef;
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f2f5f9;
      font-weight: bold;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccd5df;
      border-radius: 10px;
      background: #fafbfc;
    }

    @media (max-width: 800px) {
      .search-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 class="page-title">議員管理システム stable</h1>
      <p class="page-desc">stable画面。data/ のデータを app.js / view_stable.js 経由で表示します。</p>
    </header>

    <section class="card">
      <h2>動作確認</h2>
      <div id="statusBox" class="status-line">読み込み中...</div>
    </section>

    <section class="card">
      <h2>検索条件</h2>
      <div class="search-row">
        <div class="field">
          <label for="searchName">議員名</label>
          <input id="searchName" type="text" placeholder="例: 山田" />
        </div>

        <div class="field">
          <label for="searchParty">会派</label>
          <select id="searchParty"></select>
        </div>

        <div class="field">
          <label for="searchStatus">在任状態</label>
          <select id="searchStatus">
            <option value="">すべて</option>
            <option value="current">現職</option>
            <option value="past">過去在任</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>一覧</h2>
      <div id="resultMeta" class="result-meta">0件</div>
      <div id="resultArea"></div>
    </section>
  </div>

  <script src="data/members.js"></script>
  <script src="data/office_terms.js"></script>
  <script src="data/parties.js"></script>
  <script src="data/member_parties.js"></script>
  <script src="data/committees.js"></script>
  <script src="data/member_committees.js"></script>
  <script src="data/councils.js"></script>
  <script src="data/member_councils.js"></script>
  <script src="data/contacts.js"></script>
  <script src="data/change_logs.js"></script>
  <script src="data/codes.js"></script>

  <script src="app.js"></script>
  <script src="view_stable.js"></script>
</body>
</html>
