<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会議詳細</title>
  <link rel="stylesheet" href="../../css/common.css" />

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --warn-soft: #fff7ed;
      --radius: 14px;
      --shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .page-header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.3;
    }

    .page-desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-details {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: 0 0 16px;
      overflow: hidden;
    }

    .status-details summary {
      cursor: pointer;
      padding: 14px 18px;
      font-weight: 600;
      user-select: none;
      list-style: none;
    }

    .status-details summary::-webkit-details-marker {
      display: none;
    }

    .status-details summary::before {
      content: "▶";
      display: inline-block;
      margin-right: 8px;
      transition: transform 0.15s ease;
    }

    .status-details[open] summary::before {
      transform: rotate(90deg);
    }

    .status-body {
      padding: 0 18px 18px;
      background: #fff;
    }

    .status-line {
      white-space: pre-wrap;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      overflow-x: auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .card-title {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.4;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .summary-item {
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
    }

    .summary-item-wide {
      width: 100%;
    }

    .summary-label {
      display: inline-block;
      min-width: 96px;
      color: var(--muted);
      font-size: 13px;
      margin-right: 8px;
      vertical-align: top;
    }

    .section-grid {
      display: grid;
      gap: 16px;
    }

    .empty {
      color: var(--muted);
      padding: 4px 0;
    }

    .empty-small {
      color: var(--muted);
      font-size: 13px;
      padding: 4px 0;
    }

    .detail-subcard {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 14px 16px;
    }

    .detail-subcard + .detail-subcard {
      margin-top: 12px;
    }

    .detail-subcard h3 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.4;
    }

    .history-row {
      margin: 8px 0;
      word-break: break-word;
    }

    .calendar-month + .calendar-month {
      margin-top: 18px;
    }

    .calendar-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday-head {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 0;
    }

    .calendar-cell {
      min-height: 110px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 8px;
      position: relative;
    }

    .calendar-cell.outside {
      background: #f9fafb;
      border-style: dashed;
      min-height: 60px;
    }

    .calendar-cell.in-term {
      box-shadow: inset 0 0 0 1px #bfdbfe;
    }

    .calendar-cell.has-events {
      cursor: pointer;
    }

    .calendar-cell.has-events:hover {
      border-color: #93c5fd;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
    }

    .calendar-day {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .calendar-items {
      display: grid;
      gap: 4px;
    }

    .calendar-item {
      border-radius: 8px;
      padding: 4px 6px;
      font-size: 11px;
      line-height: 1.35;
      word-break: break-word;
    }

    .calendar-item.plenary {
      background: #dbeafe;
    }

    .calendar-item.steering {
      background: #ede9fe;
    }

    .calendar-item.leaders {
      background: #fae8ff;
    }

    .calendar-item.special {
      background: #dcfce7;
    }

    .calendar-item.standing {
      background: #f3f4f6;
    }

    .calendar-item.question {
      background: #fff7ed;
    }

    .calendar-more {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .linked-items-details {
      margin-top: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .linked-items-details summary {
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      list-style: none;
      padding: 14px 16px;
    }

    .linked-items-details summary::-webkit-details-marker {
      display: none;
    }

    .linked-items-details summary::before {
      content: "▶";
      display: inline-block;
      margin-right: 8px;
      transition: transform 0.15s ease;
    }

    .linked-items-details[open] summary::before {
      transform: rotate(90deg);
    }

    .linked-items-body {
      padding: 0 16px 16px;
    }

    .linked-items-list {
      display: grid;
      gap: 10px;
    }

    .linked-item-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
    }

    .linked-item-main {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .linked-item-meta {
      display: grid;
      gap: 4px;
      font-size: 14px;
    }

    .linked-item-meta-line {
      word-break: break-word;
    }

    .day-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .day-modal-backdrop.show {
      display: flex;
    }

    .day-modal {
      width: min(720px, 100%);
      max-height: min(80vh, 900px);
      overflow: auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.25);
      border: 1px solid #e5e7eb;
    }

    .day-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
    }

    .day-modal-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
    }

    .day-modal-close {
      border: 1px solid #d1d5db;
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      min-width: 40px;
      min-height: 40px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .day-modal-body {
      padding: 16px 18px 18px;
    }

    .modal-item + .modal-item {
      margin-top: 12px;
    }

    .modal-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
    }

    .modal-item-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-item-note {
      white-space: pre-wrap;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .calendar-cell {
        min-height: 96px;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 20px, 1120px);
        margin-top: 12px;
      }

      .page-title {
        font-size: 24px;
      }

      .summary-label {
        min-width: 80px;
      }

      .calendar-grid {
        gap: 6px;
      }

      .calendar-cell {
        min-height: 88px;
        padding: 6px;
      }

      .calendar-item {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1 id="pageTitle" class="page-title">会議詳細</h1>
      <p id="pageDesc" class="page-desc">会議回の詳細を表示しています。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card" aria-labelledby="summaryTitle">
      <h2 id="summaryTitle" class="card-title">概要</h2>
      <div id="summaryArea" class="summary-grid">
        <div class="empty">表示対象がありません。</div>
      </div>
    </section>

    <section class="card" aria-labelledby="calendarTitle">
      <h2 id="calendarTitle" class="card-title">会期カレンダー</h2>
      <div id="calendarArea">
        <div class="empty">表示対象がありません。</div>
      </div>
    </section>

    <section class="card" aria-labelledby="specialCommitteeTitle">
      <h2 id="specialCommitteeTitle" class="card-title">特別委員会</h2>
      <div id="specialCommitteeArea">
        <div class="empty">表示対象がありません。</div>
      </div>
    </section>

    <section class="card" aria-labelledby="itemsTitle">
      <h2 id="itemsTitle" class="card-title">案件</h2>
      <div id="itemsArea">
        <div class="empty">表示対象がありません。</div>
      </div>
    </section>
  </main>

  <div id="dayModalBackdrop" class="day-modal-backdrop" aria-hidden="true">
    <div class="day-modal" role="dialog" aria-modal="true" aria-labelledby="dayModalTitle">
      <div class="day-modal-header">
        <h2 id="dayModalTitle" class="day-modal-title">日付詳細</h2>
        <button id="dayModalClose" class="day-modal-close" type="button" aria-label="閉じる">×</button>
      </div>
      <div id="dayModalBody" class="day-modal-body"></div>
    </div>
  </div>

  <script src="../../data/meetings/meetings.js"></script>
  <script src="../../data/questions/questions.js"></script>
  <script src="../../data/items/items.js"></script>
  <script src="../../data/committees/special_committee_members.js"></script>
  <script src="../../js/common.js"></script>
  <script src="../../js/meetings/view_meeting_detail.js"></script>
</body>
</html>
