<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>議題一覧</title>

  <link rel="stylesheet" href="../../css/common.css" />

  <style>
    .search-row {
      grid-template-columns: 220px 220px 1fr;
    }

    @media (max-width: 900px) {
      .search-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .search-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 class="page-title">議題一覧</h1>
      <p class="page-desc">議題ベースで、いつ・どの会議で扱われたかを追うための一覧です。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card">
      <h2>検索条件</h2>
      <div class="search-row">
        <div class="field">
          <label for="searchCategory">大分類</label>
          <select id="searchCategory">
            <option value="">すべて</option>
          </select>
        </div>

        <div class="field">
          <label for="searchSubcategory">中分類</label>
          <select id="searchSubcategory">
            <option value="">すべて</option>
          </select>
        </div>

        <div class="field">
          <label for="searchText">議題検索</label>
          <input id="searchText" type="text" placeholder="例: 日程 / 議案 / 一般質問" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>議題一覧</h2>
      <div id="resultMeta" class="result-meta">0件</div>
      <div id="resultArea"></div>
    </section>
  </div>

  <script src="../../js/core/common.js"></script>
  <script src="../../js/core/utils.js"></script>
  <script src="../../js/core/formatters.js"></script>

  <script src="../../data/meetings/meetings.js"></script>
  <script src="../../data/meetings/events.js"></script>
  <script src="../../data/agendas/agendas.js"></script>
  <script src="../../data/agendas/agenda_actions.js"></script>

  <script src="../../js/agendas/view_agendas.js"></script>
</body>
</html>
