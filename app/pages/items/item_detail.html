<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>item_detail</title>

  <link rel="stylesheet" href="../../css/common.css" />

  <style>
    .page-title {
      font-size: 28px;
    }

    .pattern-block {
      border: 1px solid #e5e9ef;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      margin-bottom: 12px;
    }

    .pattern-block:last-child {
      margin-bottom: 0;
    }

    .pattern-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .pattern-item {
      border-top: 1px solid #edf1f5;
      padding-top: 10px;
      margin-top: 10px;
    }

    .pattern-item:first-child {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }

    .pattern-item-title {
      font-weight: bold;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .calendar-month {
      margin-bottom: 20px;
    }

    .calendar-month:last-child {
      margin-bottom: 0;
    }

    .calendar-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .weekday-head {
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      color: #555;
      padding: 6px 0;
    }

    .calendar-cell {
      min-height: 100px;
      border: 1px solid #dfe5ec;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .calendar-cell.outside {
      background: #f3f5f7;
      color: #999;
    }

    .calendar-cell.has-events {
      background: #f8fbff;
    }

    .calendar-day {
      font-size: 13px;
      font-weight: bold;
    }

    .calendar-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .calendar-item {
      font-size: 12px;
      line-height: 1.4;
      border-radius: 8px;
      padding: 4px 6px;
      background: #eef3f8;
      word-break: break-word;
    }

    .calendar-item.proposed {
      background: #e8f3ff;
    }

    .calendar-item.referred {
      background: #fff4dd;
    }

    .calendar-item.decided {
      background: #eef8ea;
    }

    .calendar-item.continued {
      background: #f4eefe;
    }

    .calendar-item.withdrawn {
      background: #fdeef0;
    }

    .calendar-more {
      font-size: 12px;
      color: #555;
      padding: 2px 4px;
    }

    @media (max-width: 900px) {
      .calendar-grid {
        grid-template-columns: repeat(7, minmax(90px, 1fr));
        overflow-x: auto;
      }
    }

    @media (max-width: 700px) {
      .calendar-cell {
        min-height: 90px;
        padding: 6px;
      }

      .calendar-item {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <a href="items.html" class="back-link">← 案件一覧へ戻る</a>
      <h1 id="pageTitle" class="page-title">案件詳細</h1>
      <p id="pageDesc" class="page-desc">案件の詳細を表示します。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card">
      <h2>基本情報</h2>
      <div id="basicArea" class="summary-grid"></div>
    </section>

    <section class="card">
      <h2>進行パターン</h2>
      <div id="actionsArea"></div>
    </section>

    <section class="card">
      <h2>カレンダー</h2>
      <div id="calendarArea"></div>
    </section>
  </div>

  <script src="../../js/core/common.js"></script>
  <script src="../../js/core/utils.js"></script>
  <script src="../../js/core/formatters.js"></script>

  <script src="../../data/meetings/meetings.js"></script>
  <script src="../../data/meetings/events.js"></script>
  <script src="../../data/items/council_terms.js"></script>
  <script src="../../data/items/items.js"></script>
  <script src="../../data/items/item_actions.js"></script>

  <script src="../../js/items/view_item_detail.js"></script>
</body>
</html>
