<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>item_detail</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f7f8fa;
      color: #222;
      font-family: sans-serif;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 10px;
      color: #1457b8;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .page-desc {
      margin: 0;
      color: #555;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .status-details {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .status-details summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: bold;
      user-select: none;
    }

    .status-details summary::-webkit-details-marker {
      display: none;
    }

    .status-details summary::before {
      content: "▶ ";
      color: #555;
    }

    .status-details[open] summary::before {
      content: "▼ ";
    }

    .status-body {
      border-top: 1px solid #edf1f5;
      padding: 14px 16px;
    }

    .status-line {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      margin: 0;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-item {
      padding: 10px 12px;
      border: 1px solid #e5e9ef;
      border-radius: 10px;
      background: #fbfcfd;
      font-size: 14px;
      line-height: 1.6;
    }

    .summary-item-wide {
      grid-column: 1 / -1;
    }

    .summary-label {
      font-weight: bold;
      color: #444;
      margin-right: 6px;
    }

    .history-row {
      padding: 10px 0;
      border-bottom: 1px solid #edf1f5;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .history-row:last-child {
      border-bottom: 0;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccd5df;
      border-radius: 10px;
      background: #fafbfc;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #c8d0db;
      background: #f8fafc;
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    @media (max-width: 800px) {
      .page {
        padding: 14px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 id="pageTitle" class="page-title">案件詳細</h1>
      <p id="pageDesc" class="page-desc">案件の詳細を表示します。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card">
      <h2>基本情報</h2>
      <div id="basicArea" class="summary-grid"></div>
    </section>

    <section class="card">
      <h2>アクション履歴</h2>
      <div id="actionsArea"></div>
    </section>
  </div>

  <script src="../../js/core/utils.js"></script>
  <script src="../../js/core/formatters.js"></script>
  <script src="../../data/meetings.js"></script>
  <script src="../../data/events.js"></script>
  <script src="../../data/council_terms.js"></script>
  <script src="../../data/items.js"></script>
  <script src="../../data/item_actions.js"></script>

  <script src="../../js/items/view_item_detail.js"></script>
</body>
</html>
