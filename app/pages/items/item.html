<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>案件一覧</title>
  <link rel="stylesheet" href="../../css/common.css" />

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --warn-soft: #fff7ed;
      --radius: 14px;
      --shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .page-header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.3;
    }

    .page-desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-box {
      white-space: pre-wrap;
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      margin: 0 0 16px;
      overflow-x: auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .card-title {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.4;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1.6fr auto auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 12px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-top: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field--grow {
      flex: 1 1 260px;
    }

    .field label,
    .check-row label {
      font-size: 13px;
      color: var(--muted);
    }

    select,
    input[type="text"],
    button {
      font: inherit;
    }

    select,
    input[type="text"] {
      width: 100%;
      min-height: 40px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
    }

    .button-row {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .btn {
      min-height: 40px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .btn:hover {
      background: #f9fafb;
    }

    .btn-primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(0.97);
    }

    .check-row {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px 20px;
      align-items: start;
    }

    .summary-list {
      display: grid;
      gap: 8px;
    }

    .summary-item {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .summary-label {
      min-width: 68px;
      font-size: 13px;
      color: var(--muted);
    }

    .summary-value {
      flex: 1 1 auto;
      min-width: 0;
    }

    .section-block + .section-block {
      margin-top: 14px;
    }

    .section-block.exception .card-title {
      color: #9a3412;
    }

    .item-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #e5e7eb;
    }

    .item-row:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .item-label {
      color: var(--muted);
      font-size: 14px;
      word-break: break-word;
    }

    .item-value {
      font-weight: 600;
      word-break: break-word;
    }

    .empty {
      padding: 12px 0;
      color: var(--muted);
    }

    .helper {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .filter-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        align-items: stretch;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1100px);
        margin-top: 12px;
      }

      .page-title {
        font-size: 24px;
      }

      .item-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .item-label {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1 id="pageTitle" class="page-title">案件一覧</h1>
      <p id="pageDesc" class="page-desc">
        回を切り替えて、その定例会・臨時会で扱われた案件を確認できます。
      </p>
    </header>

    <div id="statusBox" class="status-box">item.html 読み込み成功</div>

    <section class="card" aria-labelledby="filterTitle">
      <h2 id="filterTitle" class="card-title">表示条件</h2>

      <div class="filter-grid">
        <div class="field">
          <label for="meetingSelect">回</label>
          <select id="meetingSelect" aria-label="回">
            <option value="">選択してください</option>
          </select>
        </div>

        <div class="button-row">
          <button id="prevMeetingBtn" class="btn" type="button">前の回</button>
          <button id="nextMeetingBtn" class="btn" type="button">次の回</button>
        </div>

        <div class="button-row">
          <button id="resetBtn" class="btn" type="button">解除</button>
        </div>
      </div>

      <div class="filter-row">
        <div class="check-row" role="group" aria-label="表示切替">
          <label><input id="showNormalCheckbox" type="checkbox" checked /> 通常</label>
          <label><input id="showExceptionCheckbox" type="checkbox" checked /> 例外</label>
        </div>
      </div>

      <div class="filter-row">
        <div class="field field--grow">
          <label for="keywordInput">キーワード</label>
          <input
            id="keywordInput"
            type="text"
            placeholder="件名・番号で検索"
            autocomplete="off"
          />
        </div>
        <div class="button-row">
          <button id="applyKeywordBtn" class="btn btn-primary" type="button">検索</button>
        </div>
      </div>
    </section>

    <section class="card" aria-labelledby="summaryTitle">
      <div class="summary-grid">
        <div>
          <h2 id="summaryTitle" class="card-title">表示中の回</h2>
          <div id="summaryArea" class="summary-list">
            <div class="summary-item">
              <span class="summary-label">表示中</span>
              <span class="summary-value">未選択</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">会期</span>
              <span class="summary-value">—</span>
            </div>
          </div>
        </div>

        <div>
          <a id="meetingDetailLink" href="../meetings/meeting_detail.html">会議詳細ページへ</a>
        </div>
      </div>
    </section>

    <section id="normalSection" class="card section-block" aria-labelledby="normalTitle">
      <h2 id="normalTitle" class="card-title">通常</h2>
      <div id="normalArea">
        <div class="empty">表示対象がありません。</div>
      </div>
    </section>

    <section id="exceptionSection" class="card section-block exception" aria-labelledby="exceptionTitle">
      <h2 id="exceptionTitle" class="card-title">例外</h2>
      <div id="exceptionArea">
        <div class="empty">表示対象がありません。</div>
      </div>
    </section>

    <p class="helper">
      通常は、その回の標準的な流れで扱われた案件です。例外は、追加議案・先議・修正案あり・履歴あり等を示します。
    </p>
  </main>

  <script src="../../data/meetings/meetings.js"></script>
  <script src="../../data/questions/questions.js"></script>
  <script src="../../data/items/items.js"></script>
  <script src="../../js/common.js"></script>
  <script>
    (function () {
      "use strict";

      function escapeHtml(value) {
        if (window.APP_UTILS && typeof window.APP_UTILS.escapeHtml === "function") {
          return window.APP_UTILS.escapeHtml(value);
        }
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function qs(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function normalizeDate(dateValue) {
        const value = String(dateValue || "").trim();
        if (!value) return "";

        const normalized = value.replace(/\./g, "/").replace(/-/g, "/");
        const parts = normalized.split("/");
        if (parts.length !== 3) return "";

        const y = String(parts[0]).trim();
        const m = String(parts[1]).trim();
        const d = String(parts[2]).trim();

        if (!/^\d+$/.test(y) || !/^\d+$/.test(m) || !/^\d+$/.test(d)) return "";
        return y.padStart(4, "0") + "-" + m.padStart(2, "0") + "-" + d.padStart(2, "0");
      }

      function formatDateJa(dateStr) {
        const normalized = normalizeDate(dateStr);
        if (!normalized) return "—";
        const parts = normalized.split("-");
        return Number(parts[0]) + "年" + Number(parts[1]) + "月" + Number(parts[2]) + "日";
      }

      function getArray(name) {
        return Array.isArray(window.APP_DATA[name]) ? window.APP_DATA[name] : [];
      }

      function buildMeetingOptions() {
        const meetings = getArray("items")
          .map(function (row) {
            return {
              meeting_id: String(row.meeting_id || ""),
              meeting_name: String(row.meeting_name || "")
            };
          })
          .filter(function (row) {
            return row.meeting_id && row.meeting_name;
          });

        const seen = {};
        return meetings.filter(function (row) {
          if (seen[row.meeting_id]) return false;
          seen[row.meeting_id] = true;
          return true;
        });
      }

      function renderMeetingOptions() {
        const select = document.getElementById("meetingSelect");
        if (!select) return;

        const options = buildMeetingOptions();
        const currentMeetingId = qs("meeting_id");

        select.innerHTML =
          '<option value="">選択してください</option>' +
          options.map(function (row) {
            const selected = row.meeting_id === currentMeetingId ? " selected" : "";
            return (
              '<option value="' + escapeHtml(row.meeting_id) + '"' + selected + ">" +
              escapeHtml(row.meeting_name) +
              "</option>"
            );
          }).join("");
      }

      function getMeetingRangeById(meetingId) {
        const rows = getArray("meetings").filter(function (row) {
          return String(row.meeting_id || "") === String(meetingId || "");
        });

        const dates = rows
          .map(function (row) { return normalizeDate(row.held_date); })
          .filter(Boolean)
          .sort();

        return {
          start_date: dates[0] || "",
          end_date: dates.length ? dates[dates.length - 1] : ""
        };
      }

      function renderSummary() {
        const summaryArea = document.getElementById("summaryArea");
        const meetingId = qs("meeting_id");
        if (!summaryArea) return;

        if (!meetingId) {
          summaryArea.innerHTML =
            '<div class="summary-item"><span class="summary-label">表示中</span><span class="summary-value">未選択</span></div>' +
            '<div class="summary-item"><span class="summary-label">会期</span><span class="summary-value">—</span></div>';
          return;
        }

        const item = getArray("items").find(function (row) {
          return String(row.meeting_id || "") === String(meetingId);
        });

        const range = getMeetingRangeById(meetingId);
        const meetingName = item ? String(item.meeting_name || "") : meetingId;

        summaryArea.innerHTML =
          '<div class="summary-item"><span class="summary-label">表示中</span><span class="summary-value">' +
            escapeHtml(meetingName) +
          '</span></div>' +
          '<div class="summary-item"><span class="summary-label">会期</span><span class="summary-value">' +
            escapeHtml(formatDateJa(range.start_date)) + " ～ " + escapeHtml(formatDateJa(range.end_date)) +
          "</span></div>";

        const link = document.getElementById("meetingDetailLink");
        if (link) {
          link.href = "../meetings/meeting_detail.html?meeting_id=" + encodeURIComponent(meetingId);
        }
      }

      function renderPlaceholderRows(targetId, rows) {
        const area = document.getElementById(targetId);
        if (!area) return;

        if (!rows.length) {
          area.innerHTML = '<div class="empty">表示対象がありません。</div>';
          return;
        }

        area.innerHTML = rows.map(function (row) {
          return (
            '<div class="item-row">' +
              '<div class="item-label">' + escapeHtml(row.label) + '</div>' +
              '<div class="item-value">' + escapeHtml(row.value) + '</div>' +
            '</div>'
          );
        }).join("");
      }

      function renderPlaceholders() {
        renderPlaceholderRows("normalArea", [
          { label: "議案", value: "議案第1号〜第6号" },
          { label: "請願", value: "受理番号第1号" },
          { label: "陳情", value: "受理番号第2号" },
          { label: "発議案", value: "発議案第1号〜第2号" }
        ]);

        renderPlaceholderRows("exceptionArea", [
          { label: "追加議案", value: "議案第3号、議案第5号" },
          { label: "先議", value: "議案第3号" },
          { label: "修正案あり", value: "発議案第1号" },
          { label: "履歴あり", value: "議案第2号" }
        ]);
      }

      function bindEvents() {
        const select = document.getElementById("meetingSelect");
        const prevBtn = document.getElementById("prevMeetingBtn");
        const nextBtn = document.getElementById("nextMeetingBtn");
        const resetBtn = document.getElementById("resetBtn");
        const keywordBtn = document.getElementById("applyKeywordBtn");

        if (select) {
          select.addEventListener("change", function () {
            const value = select.value;
            const url = new URL(window.location.href);
            if (value) {
              url.searchParams.set("meeting_id", value);
            } else {
              url.searchParams.delete("meeting_id");
            }
            window.location.href = url.toString();
          });
        }

        if (prevBtn) {
          prevBtn.addEventListener("click", function () {
            alert("あとで前の回への移動ロジックを実装します。");
          });
        }

        if (nextBtn) {
          nextBtn.addEventListener("click", function () {
            alert("あとで次の回への移動ロジックを実装します。");
          });
        }

        if (resetBtn) {
          resetBtn.addEventListener("click", function () {
            const keywordInput = document.getElementById("keywordInput");
            const showNormal = document.getElementById("showNormalCheckbox");
            const showException = document.getElementById("showExceptionCheckbox");
            if (keywordInput) keywordInput.value = "";
            if (showNormal) showNormal.checked = true;
            if (showException) showException.checked = true;
          });
        }

        if (keywordBtn) {
          keywordBtn.addEventListener("click", function () {
            alert("あとでキーワード検索ロジックを実装します。");
          });
        }
      }

      function renderStatus() {
        const box = document.getElementById("statusBox");
        if (!box) return;

        box.textContent = [
          "item.html 読み込み成功",
          "items: " + getArray("items").length + "件",
          "meetings: " + getArray("meetings").length + "件",
          "meeting_id: " + (qs("meeting_id") || "(未指定)")
        ].join("\n");
      }

      function init() {
        renderMeetingOptions();
        renderSummary();
        renderPlaceholders();
        bindEvents();
        renderStatus();
      }

      document.addEventListener("DOMContentLoaded", init);
    })();
  </script>
</body>
</html>
