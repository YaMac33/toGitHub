<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>案件一覧</title>
  <link rel="stylesheet" href="../../css/common.css" />

  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --radius: 14px;
      --shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      --tag-bg: #eff6ff;
      --tag-text: #1d4ed8;
      --empty-bg: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .page-header,
    .card,
    .status-details {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .page-header {
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.3;
    }

    .page-desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-details {
      margin-bottom: 16px;
      overflow: hidden;
    }

    .status-details summary {
      cursor: pointer;
      padding: 14px 18px;
      font-weight: 600;
      user-select: none;
      list-style: none;
    }

    .status-details summary::-webkit-details-marker {
      display: none;
    }

    .status-details summary::before {
      content: "▶";
      display: inline-block;
      margin-right: 8px;
      transition: transform 0.15s ease;
    }

    .status-details[open] summary::before {
      transform: rotate(90deg);
    }

    .status-body {
      padding: 0 18px 18px;
      background: #fff;
    }

    .status-line {
      white-space: pre-wrap;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 12px;
      overflow-x: auto;
    }

    .card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .card-title {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.4;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 12px 16px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    select,
    input[type="text"],
    button {
      font: inherit;
    }

    select,
    input[type="text"] {
      width: 100%;
      min-height: 40px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      min-height: 40px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .btn:hover {
      background: #f9fafb;
    }

    .btn-primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(0.97);
    }

    .empty-state {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      background: var(--empty-bg);
      border: 1px dashed var(--line);
      border-radius: 12px;
    }

    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .meeting-group + .meeting-group {
      margin-top: 18px;
      border-top: 1px solid #e5e7eb;
      padding-top: 18px;
    }

    .meeting-group-title {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.4;
    }

    .result-card-list {
      display: grid;
      gap: 12px;
    }

    .result-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 14px 16px;
    }

    .result-number {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .result-title {
      margin-bottom: 10px;
      font-size: 15px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 6px 12px;
      font-size: 14px;
    }

    .result-label {
      color: var(--muted);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.6;
      border: 1px solid #bfdbfe;
    }

    .helper {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 20px, 1100px);
        margin-top: 12px;
      }

      .page-title {
        font-size: 24px;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .result-grid {
        grid-template-columns: 1fr;
        gap: 2px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1 class="page-title">案件一覧</h1>
      <p class="page-desc">元号を選択して、案件を検索できます。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card" aria-labelledby="eraTitle">
      <h2 id="eraTitle" class="card-title">元号選択</h2>

      <div class="field-grid">
        <div class="field">
          <label for="eraSelect">元号</label>
          <select id="eraSelect">
            <option value="">選択してください</option>
            <option value="R">令和</option>
            <option value="H">平成</option>
          </select>
        </div>
      </div>

      <p class="helper">元号を選択すると、その元号の案件一覧が表示されます。</p>
    </section>

    <section id="searchCard" class="card" aria-labelledby="searchTitle" style="display:none;">
      <h2 id="searchTitle" class="card-title">検索条件</h2>

      <div class="field-grid">
        <div class="field">
          <label for="meetingSelect">回</label>
          <select id="meetingSelect">
            <option value="">すべて</option>
          </select>
        </div>

        <div class="field">
          <label for="exceptionSelect">例外</label>
          <select id="exceptionSelect">
            <option value="">すべて</option>
            <option value="追加議案">追加議案</option>
            <option value="先議">先議</option>
            <option value="修正案あり">修正案あり</option>
            <option value="履歴あり">履歴あり</option>
            <option value="通常外付託">通常外付託</option>
            <option value="なし">例外なし</option>
          </select>
        </div>

        <div class="field">
          <label for="numberInput">番号</label>
          <input id="numberInput" type="text" placeholder="議案第1号 / 受理番号第2号 など" />
        </div>

        <div class="field">
          <label for="titleInput">件名</label>
          <input id="titleInput" type="text" placeholder="キーワード入力" />
        </div>
      </div>

      <div class="button-row">
        <button id="searchBtn" class="btn btn-primary" type="button">検索</button>
        <button id="resetBtn" class="btn" type="button">解除</button>
      </div>
    </section>

    <section id="resultMetaCard" class="card" aria-labelledby="resultMetaTitle" style="display:none;">
      <h2 id="resultMetaTitle" class="card-title">検索結果</h2>
      <div id="resultMeta" class="result-meta">
        <span>検索結果件数：0件</span>
      </div>
    </section>

    <section id="emptyCard" class="card">
      <div class="empty-state">元号を選択してください。</div>
    </section>

    <section id="resultCard" class="card" aria-labelledby="resultTitle" style="display:none;">
      <h2 id="resultTitle" class="card-title">検索結果カード一覧</h2>
      <div id="resultArea"></div>
    </section>

    <p class="helper">
      並び順は、年の降順 → 回の降順 → 議案→請願・陳情→発議案 → 番号昇順です。
    </p>
  </main>

  <script src="../../data/items/items.js"></script>
  <script src="../../data/meetings/meetings.js"></script>
  <script src="../../data/questions/questions.js"></script>
  <script src="../../js/common.js"></script>
  <script>
    (function () {
      "use strict";

      function escapeHtml(value) {
        if (window.APP_UTILS && typeof window.APP_UTILS.escapeHtml === "function") {
          return window.APP_UTILS.escapeHtml(value);
        }
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getArray(name) {
        return Array.isArray(window.APP_DATA[name]) ? window.APP_DATA[name] : [];
      }

      function getItems() {
        return getArray("items");
      }

      function getMeetings() {
        return getArray("meetings");
      }

      function getQuestions() {
        return getArray("questions");
      }

      function toNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function getEraCodeFromRow(row) {
        const numberCode = String(row.number_code || row["号"] || "").trim().toUpperCase();
        if (numberCode === "R" || numberCode === "H") return numberCode;

        const fiscalYearLabel = String(row.fiscal_year_label || row["年度"] || "");
        if (fiscalYearLabel.indexOf("令和") >= 0) return "R";
        if (fiscalYearLabel.indexOf("平成") >= 0) return "H";

        const meetingName = String(row.meeting_name || "");
        if (meetingName.indexOf("令和") >= 0) return "R";
        if (meetingName.indexOf("平成") >= 0) return "H";

        return "";
      }

      function normalizeDate(dateValue) {
        const value = String(dateValue || "").trim();
        if (!value) return "";

        const normalized = value.replace(/\./g, "/").replace(/-/g, "/");
        const parts = normalized.split("/");
        if (parts.length !== 3) return "";

        const y = String(parts[0]).trim();
        const m = String(parts[1]).trim();
        const d = String(parts[2]).trim();

        if (!/^\d+$/.test(y) || !/^\d+$/.test(m) || !/^\d+$/.test(d)) return "";
        return y.padStart(4, "0") + "-" + m.padStart(2, "0") + "-" + d.padStart(2, "0");
      }

      function formatDateJa(dateStr) {
        const normalized = normalizeDate(dateStr);
        if (!normalized) return "—";

        const parts = normalized.split("-");
        const seireki = Number(parts[0]);
        const month = Number(parts[1]);
        const day = Number(parts[2]);

        if (!Number.isFinite(seireki) || !Number.isFinite(month) || !Number.isFinite(day)) {
          return "—";
        }

        if (seireki >= 2019) {
          return "令和" + (seireki - 2018) + "年" + month + "月" + day + "日";
        }
        if (seireki >= 1989) {
          return "平成" + (seireki - 1988) + "年" + month + "月" + day + "日";
        }
        if (seireki >= 1926) {
          return "昭和" + (seireki - 1925) + "年" + month + "月" + day + "日";
        }

        return seireki + "年" + month + "月" + day + "日";
      }

      function getResultLabel(row) {
        const code = String(row.result_code || "").trim().toUpperCase();
        const map = {
          KK: "可決",
          HK: "否決",
          DO: "同意",
          TK: "適任",
          SN: "承認",
          NT: "認定",
          ST: "採択",
          SS: "採択送付",
          FS: "不採択",
          KZ: "継続",
          TS: "取下げ"
        };
        return map[code] || code || "";
      }

      function getDisplayLabel(row) {
        const n = toNumber(row.item_no_numeric);
        if (row.item_class === "GI") return "議案第" + n + "号";
        if (row.item_class === "SG") return "受理番号第" + n + "号";
        if (row.item_class === "CJ") return "受理番号第" + n + "号";
        if (row.item_class === "HG") return "発議案第" + n + "号";
        return String(row.item_no || "");
      }

      function getItemClassOrder(row) {
        const cls = String(row.item_class || "");
        if (cls === "GI") return 1;
        if (cls === "SG" || cls === "CJ") return 2;
        if (cls === "HG") return 3;
        return 9;
      }

      function getQuestionLastDate(meetingId) {
        return getQuestions()
          .filter(function (row) {
            return String(row.meeting_id || "") === String(meetingId || "");
          })
          .map(function (row) {
            return normalizeDate(row.question_date);
          })
          .filter(Boolean)
          .sort()
          .slice(-1)[0] || "";
      }

      function getPlenaryDates(meetingId) {
        const dates = getMeetings()
          .filter(function (row) {
            return String(row.meeting_id || "") === String(meetingId || "") &&
              String(row.meeting_type_code || "") === "HNKG";
          })
          .map(function (row) {
            return normalizeDate(row.held_date);
          })
          .filter(Boolean)
          .sort();

        return dates.filter(function (date, index, arr) {
          return arr.indexOf(date) === index;
        });
      }

      function getReferenceDates(meetingId) {
        const plenaryDates = getPlenaryDates(meetingId);
        const questionLastDate = getQuestionLastDate(meetingId);

        const petitionCandidates = plenaryDates.filter(function (date) {
          return questionLastDate && date <= questionLastDate;
        });

        return {
          plenary_first_date: plenaryDates[0] || "",
          plenary_second_date: plenaryDates[1] || "",
          plenary_last_date: plenaryDates.length ? plenaryDates[plenaryDates.length - 1] : "",
          petition_standard_date: petitionCandidates.length ? petitionCandidates[petitionCandidates.length - 1] : ""
        };
      }

      function getExceptionTags(row) {
        const tags = [];
        const refs = getReferenceDates(String(row.meeting_id || ""));

        const teian = normalizeDate(row.teian_date || row["提案日"]);
        const futaku = normalizeDate(row.futaku_date || row["付託日"]);
        const giketsu = normalizeDate(row.giketsu_date || row["議決日"]);
        const syuseian = String(row.syuseian_flag || "").trim() === "1";
        const rireki = String(row.rireki_flag || "").trim() === "1";

        if (row.item_class === "GI") {
          if (teian && refs.plenary_first_date && teian !== refs.plenary_first_date) {
            tags.push("追加議案");
          }
          if (giketsu && refs.plenary_last_date && giketsu < refs.plenary_last_date) {
            tags.push("先議");
          }
        }

        if (row.item_class === "SG" || row.item_class === "CJ") {
          if (futaku && refs.petition_standard_date && futaku !== refs.petition_standard_date) {
            tags.push("通常外付託");
          }
          if (giketsu && refs.plenary_last_date && giketsu < refs.plenary_last_date) {
            tags.push("先議");
          }
        }

        if (row.item_class === "HG") {
          if (teian && refs.plenary_last_date && teian !== refs.plenary_last_date) {
            tags.push("追加議案");
          }
          if (giketsu && refs.plenary_last_date && giketsu < refs.plenary_last_date) {
            tags.push("先議");
          }
        }

        if (syuseian) {
          tags.push("修正案あり");
        }
        if (rireki) {
          tags.push("履歴あり");
        }

        return tags.filter(function (tag, index, arr) {
          return arr.indexOf(tag) === index;
        });
      }

      function buildMeetingOptions(items, eraCode) {
        const seen = {};
        const options = items
          .filter(function (row) {
            return getEraCodeFromRow(row) === eraCode;
          })
          .map(function (row) {
            return {
              meeting_id: String(row.meeting_id || ""),
              meeting_name: String(row.meeting_name || ""),
              year: toNumber(row.year || 0),
              session: toNumber(row.session || row["回"] || 0)
            };
          })
          .filter(function (row) {
            if (!row.meeting_id || !row.meeting_name) return false;
            if (seen[row.meeting_id]) return false;
            seen[row.meeting_id] = true;
            return true;
          });

        options.sort(function (a, b) {
          if (a.year !== b.year) return b.year - a.year;
          if (a.session !== b.session) return b.session - a.session;
          return a.meeting_id < b.meeting_id ? -1 : a.meeting_id > b.meeting_id ? 1 : 0;
        });

        return options;
      }

      function fillMeetingSelect(options) {
        const select = document.getElementById("meetingSelect");
        if (!select) return;

        select.innerHTML =
          '<option value="">すべて</option>' +
          options.map(function (row) {
            return (
              '<option value="' + escapeHtml(row.meeting_id) + '">' +
              escapeHtml(row.meeting_name) +
              "</option>"
            );
          }).join("");
      }

      function filterItemsByEra(items, eraCode) {
        return items.filter(function (row) {
          return getEraCodeFromRow(row) === eraCode;
        });
      }

      function filterItems(items) {
        const meetingId = document.getElementById("meetingSelect").value;
        const exceptionValue = document.getElementById("exceptionSelect").value;
        const numberKeyword = String(document.getElementById("numberInput").value || "").trim().toLowerCase();
        const titleKeyword = String(document.getElementById("titleInput").value || "").trim().toLowerCase();

        return items.filter(function (row) {
          if (meetingId && String(row.meeting_id || "") !== meetingId) return false;

          const displayLabel = getDisplayLabel(row).toLowerCase();
          const title = String(row.title || "").toLowerCase();

          if (numberKeyword && displayLabel.indexOf(numberKeyword) < 0) return false;
          if (titleKeyword && title.indexOf(titleKeyword) < 0) return false;

          const tags = getExceptionTags(row);

          if (exceptionValue === "なし" && tags.length > 0) return false;
          if (exceptionValue && exceptionValue !== "なし" && tags.indexOf(exceptionValue) < 0) return false;

          return true;
        });
      }

      function sortItems(items) {
        return items.slice().sort(function (a, b) {
          const ay = toNumber(a.year || 0);
          const by = toNumber(b.year || 0);
          if (ay !== by) return by - ay;

          const as = toNumber(a.session || a["回"] || 0);
          const bs = toNumber(b.session || b["回"] || 0);
          if (as !== bs) return bs - as;

          const ac = getItemClassOrder(a);
          const bc = getItemClassOrder(b);
          if (ac !== bc) return ac - bc;

          const an = toNumber(a.item_no_numeric);
          const bn = toNumber(b.item_no_numeric);
          if (an !== bn) return an - bn;

          const aid = String(a.item_id || "");
          const bid = String(b.item_id || "");
          return aid < bid ? -1 : aid > bid ? 1 : 0;
        });
      }

      function groupItemsByMeeting(items) {
        const groups = {};
        const order = [];

        items.forEach(function (row) {
          const key = String(row.meeting_id || "");
          if (!groups[key]) {
            groups[key] = {
              meeting_id: key,
              meeting_name: String(row.meeting_name || ""),
              year: toNumber(row.year || 0),
              session: toNumber(row.session || row["回"] || 0),
              items: []
            };
            order.push(key);
          }
          groups[key].items.push(row);
        });

        order.sort(function (a, b) {
          const ga = groups[a];
          const gb = groups[b];
          if (ga.year !== gb.year) return gb.year - ga.year;
          if (ga.session !== gb.session) return gb.session - ga.session;
          return ga.meeting_id < gb.meeting_id ? -1 : ga.meeting_id > gb.meeting_id ? 1 : 0;
        });

        return order.map(function (key) {
          return groups[key];
        });
      }

      function renderResultMeta(items) {
        const metaCard = document.getElementById("resultMetaCard");
        const resultMeta = document.getElementById("resultMeta");

        if (!metaCard || !resultMeta) return;

        metaCard.style.display = "";
        resultMeta.innerHTML =
          "<span>検索結果件数：" + escapeHtml(String(items.length)) + "件</span>" +
          "<span>並び順：年降順 → 回降順 → 議案→請願・陳情→発議案 → 番号昇順</span>";
      }

      function renderEmpty(message) {
        const emptyCard = document.getElementById("emptyCard");
        const resultCard = document.getElementById("resultCard");
        const resultMetaCard = document.getElementById("resultMetaCard");
        const resultArea = document.getElementById("resultArea");

        if (emptyCard) {
          emptyCard.style.display = "";
          emptyCard.innerHTML = '<div class="empty-state">' + escapeHtml(message) + "</div>";
        }
        if (resultCard) resultCard.style.display = "none";
        if (resultMetaCard) resultMetaCard.style.display = "none";
        if (resultArea) resultArea.innerHTML = "";
      }

      function renderResults(items) {
        const emptyCard = document.getElementById("emptyCard");
        const resultCard = document.getElementById("resultCard");
        const resultArea = document.getElementById("resultArea");

        if (!resultCard || !resultArea) return;

        if (!items.length) {
          renderEmpty("該当する案件はありません。");
          return;
        }

        if (emptyCard) emptyCard.style.display = "none";
        resultCard.style.display = "";
        renderResultMeta(items);

        const groups = groupItemsByMeeting(items);

        resultArea.innerHTML = groups.map(function (group) {
          const cardsHtml = group.items.map(function (row) {
            const tags = getExceptionTags(row);
            const tagHtml = tags.length
              ? '<div class="tag-list">' + tags.map(function (tag) {
                  return '<span class="tag">' + escapeHtml(tag) + '</span>';
                }).join("") + '</div>'
              : '';

            return (
              '<div class="result-card">' +
                '<div class="result-number">' + escapeHtml(getDisplayLabel(row)) + "</div>" +
                '<div class="result-title">' + escapeHtml(String(row.title || "")) + "</div>" +
                '<div class="result-grid">' +
                  '<div class="result-label">付託委員会</div>' +
                  '<div>' + escapeHtml(String(row.committee_name || "—")) + "</div>" +

                  '<div class="result-label">提案日</div>' +
                  '<div>' + escapeHtml(formatDateJa(row.teian_date || row["提案日"])) + "</div>" +

                  '<div class="result-label">付託日</div>' +
                  '<div>' + escapeHtml(formatDateJa(row.futaku_date || row["付託日"])) + "</div>" +

                  '<div class="result-label">議決結果</div>' +
                  '<div>' + escapeHtml(getResultLabel(row)) + "</div>" +

                  '<div class="result-label">議決日</div>' +
                  '<div>' + escapeHtml(formatDateJa(row.giketsu_date || row["議決日"])) + "</div>" +

                  (tags.length
                    ? '<div class="result-label">例外情報</div><div>' + tagHtml + '</div>'
                    : ''
                  ) +
                "</div>" +
              "</div>"
            );
          }).join("");

          return (
            '<section class="meeting-group">' +
              '<h3 class="meeting-group-title">▼ ' + escapeHtml(group.meeting_name) + "</h3>" +
              '<div class="result-card-list">' + cardsHtml + "</div>" +
            "</section>"
          );
        }).join("");
      }

      function updatePageByEra() {
        const eraCode = document.getElementById("eraSelect").value;
        const allItems = getItems();
        const searchCard = document.getElementById("searchCard");

        if (!eraCode) {
          if (searchCard) searchCard.style.display = "none";
          renderEmpty("元号を選択してください。");
          renderStatus({
            eraCode: "",
            baseCount: 0,
            filteredCount: 0,
            meetingOptions: 0
          });
          return;
        }

        const eraItems = filterItemsByEra(allItems, eraCode);
        const meetingOptions = buildMeetingOptions(allItems, eraCode);
        fillMeetingSelect(meetingOptions);

        if (searchCard) searchCard.style.display = "";
        updateSearchResults(eraItems, eraCode, meetingOptions.length);
      }

      function updateSearchResults(baseItems, eraCode, meetingOptionsCount) {
        const filtered = sortItems(filterItems(baseItems));
        renderResults(filtered);
        renderStatus({
          eraCode: eraCode,
          baseCount: baseItems.length,
          filteredCount: filtered.length,
          meetingOptions: meetingOptionsCount
        });
      }

      function renderStatus(info) {
        const box = document.getElementById("statusBox");
        if (!box) return;

        box.textContent = [
          "items.html 読み込み成功",
          "items: " + getItems().length + "件",
          "meetings: " + getMeetings().length + "件",
          "questions: " + getQuestions().length + "件",
          "selected_era: " + (info.eraCode || "(未選択)"),
          "base_items: " + info.baseCount + "件",
          "filtered_items: " + info.filteredCount + "件",
          "meeting_options: " + info.meetingOptions + "件"
        ].join("\n");
      }

      function bindEvents() {
        const eraSelect = document.getElementById("eraSelect");
        const searchBtn = document.getElementById("searchBtn");
        const resetBtn = document.getElementById("resetBtn");
        const meetingSelect = document.getElementById("meetingSelect");
        const exceptionSelect = document.getElementById("exceptionSelect");
        const numberInput = document.getElementById("numberInput");
        const titleInput = document.getElementById("titleInput");

        if (eraSelect) {
          eraSelect.addEventListener("change", function () {
            document.getElementById("numberInput").value = "";
            document.getElementById("titleInput").value = "";
            document.getElementById("exceptionSelect").value = "";
            updatePageByEra();
          });
        }

        if (searchBtn) {
          searchBtn.addEventListener("click", function () {
            const eraCode = eraSelect.value;
            if (!eraCode) return;
            const baseItems = filterItemsByEra(getItems(), eraCode);
            const meetingOptions = buildMeetingOptions(getItems(), eraCode);
            updateSearchResults(baseItems, eraCode, meetingOptions.length);
          });
        }

        if (resetBtn) {
          resetBtn.addEventListener("click", function () {
            if (meetingSelect) meetingSelect.value = "";
            if (exceptionSelect) exceptionSelect.value = "";
            if (numberInput) numberInput.value = "";
            if (titleInput) titleInput.value = "";

            const eraCode = eraSelect.value;
            if (!eraCode) {
              updatePageByEra();
              return;
            }

            const baseItems = filterItemsByEra(getItems(), eraCode);
            const meetingOptions = buildMeetingOptions(getItems(), eraCode);
            updateSearchResults(baseItems, eraCode, meetingOptions.length);
          });
        }

        [meetingSelect, exceptionSelect].forEach(function (el) {
          if (!el) return;
          el.addEventListener("change", function () {
            const eraCode = eraSelect.value;
            if (!eraCode) return;
            const baseItems = filterItemsByEra(getItems(), eraCode);
            const meetingOptions = buildMeetingOptions(getItems(), eraCode);
            updateSearchResults(baseItems, eraCode, meetingOptions.length);
          });
        });

        [numberInput, titleInput].forEach(function (el) {
          if (!el) return;
          el.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
              const eraCode = eraSelect.value;
              if (!eraCode) return;
              const baseItems = filterItemsByEra(getItems(), eraCode);
              const meetingOptions = buildMeetingOptions(getItems(), eraCode);
              updateSearchResults(baseItems, eraCode, meetingOptions.length);
            }
          });
        });
      }

      function init() {
        bindEvents();
        renderEmpty("元号を選択してください。");
        renderStatus({
          eraCode: "",
          baseCount: 0,
          filteredCount: 0,
          meetingOptions: 0
        });
      }

      document.addEventListener("DOMContentLoaded", init);
    })();
  </script>
</body>
</html>
