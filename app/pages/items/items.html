<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>items</title>

  <link rel="stylesheet" href="../../css/common.css" />

  <style>
    .search-row {
      grid-template-columns: 220px 260px 220px 1fr;
    }

    @media (max-width: 900px) {
      .search-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .search-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 class="page-title">案件管理</h1>
      <p class="page-desc">議案・請願・陳情・発議案を一覧表示する画面です。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card">
      <h2>検索条件</h2>
      <div class="search-row">
        <div class="field">
          <label for="searchClass">大分類</label>
          <select id="searchClass">
            <option value="">すべて</option>
            <option value="BILL">議案</option>
            <option value="PROPOSAL">発議案</option>
            <option value="PETITION">請願</option>
            <option value="REQUEST">陳情</option>
          </select>
        </div>

        <div class="field">
          <label for="searchSubclass">中分類</label>
          <select id="searchSubclass">
            <option value="">すべて</option>
          </select>
        </div>

        <div class="field">
          <label for="searchYearWareki">年（和暦）</label>
          <select id="searchYearWareki">
            <option value="">すべて</option>
          </select>
        </div>

        <div class="field">
          <label for="searchText">件名検索</label>
          <input id="searchText" type="text" placeholder="例: 補正予算 / 条例 / 請願" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>案件一覧</h2>
      <div id="resultMeta" class="result-meta">0件</div>
      <div id="resultArea"></div>
    </section>
  </div>

  <script src="../../js/core/common.js"></script>
  <script src="../../js/core/utils.js"></script>
  <script src="../../js/core/formatters.js"></script>

  <script src="../../data/meetings/meetings.js"></script>
  <script src="../../data/meetings/events.js"></script>
  <script src="../../data/items/council_terms.js"></script>
  <script src="../../data/items/items.js"></script>
  <script src="../../data/items/item_actions.js"></script>

  <script src="../../js/items/view_items.js"></script>
</body>
</html>
