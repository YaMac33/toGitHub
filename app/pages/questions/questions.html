<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>議会通告検索システム</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .page-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .page-header h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 700;
      color: #111827;
    }

    .page-header p {
      margin: 0;
      font-size: 14px;
      color: #6b7280;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      margin-bottom: 24px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .control-row + .control-row {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f1f5f9;
    }

    .search-box {
      flex: 1 1 320px;
    }

    .search-box input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }

    .search-box input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      color: #374151;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:hover {
      background: #f9fafb;
    }

    .btn-primary {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #1f2937;
    }

    .mode-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mode-label,
    .sort-label {
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      white-space: nowrap;
    }

    .mode-switch {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: #f3f4f6;
      border-radius: 12px;
    }

    .mode-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #4b5563;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .mode-btn.active {
      background: #ffffff;
      color: #1d4ed8;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      border: 1px solid #e5e7eb;
    }

    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .sort-wrap select {
      min-width: 180px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #ffffff;
      font-size: 14px;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      margin-bottom: 20px;
      padding: 0 4px;
      font-size: 14px;
    }

    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4b5563;
    }

    .summary-label {
      font-weight: 700;
    }

    .summary-chip {
      display: inline-block;
      padding: 2px 8px;
      background: #f3f4f6;
      border-radius: 999px;
      color: #111827;
      font-weight: 600;
    }

    .summary-count {
      color: #2563eb;
      font-weight: 700;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #ffffff;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    .results-table th,
    .results-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    .results-table th {
      background: #f9fafb;
      color: #6b7280;
      font-weight: 700;
      white-space: nowrap;
    }

    .results-table tr:hover td {
      background: #fcfcfd;
    }

    .muted {
      color: #6b7280;
    }

    .mono-chip {
      display: inline-block;
      padding: 2px 8px;
      background: #f3f4f6;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      font-family: monospace;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      gap: 20px;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      padding: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .card-title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: #111827;
    }

    .card-count {
      font-size: 13px;
      font-weight: 700;
      color: #475569;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      border-radius: 999px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .section-block {
      margin-bottom: 18px;
    }

    .section-block:last-child {
      margin-bottom: 0;
    }

    .section-title {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
      color: #1d4ed8;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
    }

    .notice-block {
      margin-left: 10px;
      margin-bottom: 14px;
      padding-left: 14px;
      border-left: 2px solid #eef2f7;
    }

    .notice-block:last-child {
      margin-bottom: 0;
    }

    .notice-title {
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 700;
      color: #374151;
    }

    .member-title {
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
      color: #374151;
    }

    .tree-block {
      display: grid;
      gap: 6px;
    }

    .tree-row {
      position: relative;
      padding: 10px 0 10px 24px;
      border-bottom: 1px dashed #f1f5f9;
    }

    .tree-row:last-child {
      border-bottom: none;
    }

    .tree-row::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 6px;
      width: 2px;
      background: #e5e7eb;
    }

    .tree-row::after {
      content: "";
      position: absolute;
      top: 22px;
      left: 6px;
      width: 12px;
      height: 2px;
      background: #e5e7eb;
    }

    .depth-0 {
      margin-left: 0;
    }

    .depth-1 {
      margin-left: 24px;
    }

    .depth-2 {
      margin-left: 48px;
    }

    .tree-inner {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .tree-label-badge {
      display: inline-block;
      min-width: 52px;
      text-align: center;
      padding: 2px 8px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
      font-family: monospace;
      flex: 0 0 auto;
      margin-top: 2px;
    }

    .tree-content {
      flex: 1 1 auto;
      line-height: 1.8;
      color: #374151;
      word-break: break-word;
    }

    .more-wrap {
      margin-top: 10px;
      padding-left: 6px;
    }

    .more-btn {
      padding: 7px 14px;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      color: #4b5563;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .more-btn:hover {
      background: #f3f4f6;
    }

    .empty-box {
      padding: 32px 20px;
      text-align: center;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #ffffff;
    }

    @media (max-width: 768px) {
      .page {
        padding: 16px 12px 24px;
      }

      .page-header h1 {
        font-size: 24px;
      }

      .card-title {
        font-size: 18px;
      }

      .control-row {
        flex-direction: column;
        align-items: stretch;
      }

      .sort-wrap {
        margin-left: 0;
      }

      .mode-group,
      .sort-wrap {
        width: 100%;
      }

      .mode-switch {
        flex-wrap: wrap;
      }

      .tree-inner {
        flex-direction: column;
        gap: 8px;
      }

      .depth-1 {
        margin-left: 12px;
      }

      .depth-2 {
        margin-left: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="page-header">
      <h1>議会通告検索システム</h1>
      <p>議員名・内容・通告Noなどで検索し、整理された形式で閲覧できます。</p>
    </header>

    <section class="panel">
      <div class="control-row">
        <div class="search-box">
          <input id="keywordInput" type="text" placeholder="議員名・内容・通告Noなどで検索..." />
        </div>
        <div class="button-row">
          <button id="searchBtn" type="button" class="btn btn-primary">検索</button>
          <button id="clearBtn" type="button" class="btn">クリア</button>
        </div>
      </div>

      <div class="control-row">
        <div class="mode-group">
          <span class="mode-label">表示形式</span>
          <div class="mode-switch">
            <button id="viewTableBtn" type="button" class="mode-btn">一覧表</button>
            <button id="viewMemberBtn" type="button" class="mode-btn">人ごと</button>
            <button id="viewSessionBtn" type="button" class="mode-btn">回ごと</button>
          </div>
        </div>

        <div class="sort-wrap">
          <label for="sortSelect" class="sort-label">並び順</label>
          <select id="sortSelect">
            <option value="desc">新しい順（降順）</option>
            <option value="asc">古い順（昇順）</option>
          </select>
        </div>
      </div>
    </section>

    <section class="summary">
      <div class="summary-item">
        <span class="summary-label">検索語:</span>
        <span id="summaryKeyword" class="summary-chip">なし</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">検索結果:</span>
        <span id="summaryCount" class="summary-count">0件</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">現在の表示:</span>
        <span id="summaryView">一覧表</span>
      </div>
    </section>

    <main id="resultsArea"></main>
  </div>

  <script>
    const RECORDS = [
      { fiscal_year: "6", id: "R811佐藤太郎1", number: "R", year: "8", session: "1", notice_no: "1", member_name: "佐藤太郎", group: "○○会", major_no: "1", middle_no: "-", minor_no: "-", content: "地域防災計画の見直しについて問う。" },
      { fiscal_year: "6", id: "R811佐藤太郎2", number: "R", year: "8", session: "1", notice_no: "1", member_name: "佐藤太郎", group: "○○会", major_no: "1", middle_no: "1", minor_no: "-", content: "避難所の運営体制の現状について問う。" },
      { fiscal_year: "6", id: "R811佐藤太郎3", number: "R", year: "8", session: "1", notice_no: "1", member_name: "佐藤太郎", group: "○○会", major_no: "1", middle_no: "1", minor_no: "1", content: "高齢者対応の具体的な施策について問う。" },
      { fiscal_year: "6", id: "R742鈴木花子1", number: "R", year: "7", session: "4", notice_no: "2", member_name: "鈴木花子", group: "無所属", major_no: "1", middle_no: "-", minor_no: "-", content: "学校ICT環境の整備状況について問う。" },
      { fiscal_year: "6", id: "R742鈴木花子2", number: "R", year: "7", session: "4", notice_no: "2", member_name: "鈴木花子", group: "無所属", major_no: "1", middle_no: "1", minor_no: "-", content: "端末配備率と活用状況について問う。" },
      { fiscal_year: "6", id: "R733田中一郎1", number: "R", year: "7", session: "3", notice_no: "3", member_name: "田中一郎", group: "△△党", major_no: "1", middle_no: "-", minor_no: "-", content: "観光振興施策の現状と課題について問う。" },
      { fiscal_year: "31", id: "H314山田次郎1", number: "H", year: "31", session: "4", notice_no: "1", member_name: "山田次郎", group: "□□会", major_no: "1", middle_no: "-", minor_no: "-", content: "公共交通の維持に関する施策について問う。" }
    ];

    (function () {
      "use strict";

      const state = {
        keyword: "",
        viewMode: "table",
        sortOrder: "desc"
      };

      const expandedMap = {};

      const els = {
        keywordInput: document.getElementById("keywordInput"),
        searchBtn: document.getElementById("searchBtn"),
        clearBtn: document.getElementById("clearBtn"),
        viewTableBtn: document.getElementById("viewTableBtn"),
        viewMemberBtn: document.getElementById("viewMemberBtn"),
        viewSessionBtn: document.getElementById("viewSessionBtn"),
        sortSelect: document.getElementById("sortSelect"),
        summaryKeyword: document.getElementById("summaryKeyword"),
        summaryCount: document.getElementById("summaryCount"),
        summaryView: document.getElementById("summaryView"),
        resultsArea: document.getElementById("resultsArea")
      };

      function escapeHtml(v) {
        return String(v == null ? "" : v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeText(v) {
        return String(v == null ? "" : v).replace(/\s+/g, " ").trim();
      }

      function toNumber(v) {
        const n = parseInt(v, 10);
        return isNaN(n) ? 0 : n;
      }

      function getEraPriority(n) {
        n = normalizeText(n).toUpperCase();
        if (n === "R") return 0;
        if (n === "H") return 1;
        return 9;
      }

      function formatYear(number, year) {
        number = normalizeText(number).toUpperCase();
        year = normalizeText(year);
        if (number === "R") return "令和" + year + "年";
        if (number === "H") return "平成" + year + "年";
        return year + "年";
      }

      function formatSession(session) {
        return "第" + toNumber(session) + "回定例会";
      }

      function formatYS(r) {
        return formatYear(r.number, r.year) + " / " + formatSession(r.session);
      }

      function buildTreeLabel(r) {
        const a = normalizeText(r.major_no);
        const b = normalizeText(r.middle_no);
        const c = normalizeText(r.minor_no);
        const arr = [];
        if (a && a !== "-") arr.push(a);
        if (b && b !== "-") arr.push(b);
        if (c && c !== "-") arr.push(c);
        return arr.join("-") || "-";
      }

      function getDepth(r) {
        if (r.minor_no && r.minor_no !== "-") return 2;
        if (r.middle_no && r.middle_no !== "-") return 1;
        return 0;
      }

      function compareRecords(a, b) {
        let cmp = 0;

        const e = getEraPriority(a.number) - getEraPriority(b.number);
        if (e !== 0) {
          cmp = e;
        } else {
          const y = toNumber(b.year) - toNumber(a.year);
          if (y !== 0) {
            cmp = y;
          } else {
            const s = toNumber(b.session) - toNumber(a.session);
            if (s !== 0) {
              cmp = s;
            } else {
              cmp = toNumber(a.notice_no) - toNumber(b.notice_no);
            }
          }
        }

        return state.sortOrder === "asc" ? cmp * -1 : cmp;
      }

      function compareTreeRecords(a, b) {
        const aMajor = toNumber(a.major_no);
        const bMajor = toNumber(b.major_no);
        if (aMajor !== bMajor) return aMajor - bMajor;

        const aMiddle = toNumber(a.middle_no);
        const bMiddle = toNumber(b.middle_no);
        if (aMiddle !== bMiddle) return aMiddle - bMiddle;

        const aMinor = toNumber(a.minor_no);
        const bMinor = toNumber(b.minor_no);
        if (aMinor !== bMinor) return aMinor - bMinor;

        return 0;
      }

      function filterRecords(records, keyword) {
        const q = normalizeText(keyword).toLowerCase();
        if (!q) return records.slice();

        return records.filter(r => {
          return (
            normalizeText(r.member_name).toLowerCase().includes(q) ||
            normalizeText(r.content).toLowerCase().includes(q) ||
            normalizeText(r.notice_no).includes(q)
          );
        });
      }

      function groupMember(records) {
        const map = {};

        records.forEach(r => {
          const member = r.member_name || "不明";
          if (!map[member]) {
            map[member] = {
              member: member,
              group: r.group,
              ys: {}
            };
          }

          const ysKey = r.number + "_" + r.year + "_" + r.session;
          if (!map[member].ys[ysKey]) {
            map[member].ys[ysKey] = {
              number: r.number,
              year: r.year,
              session: r.session,
              notices: {}
            };
          }

          const notice = r.notice_no;
          if (!map[member].ys[ysKey].notices[notice]) {
            map[member].ys[ysKey].notices[notice] = [];
          }

          map[member].ys[ysKey].notices[notice].push(r);
        });

        return Object.values(map);
      }

      function groupSession(records) {
        const map = {};

        records.forEach(r => {
          const sessionKey = r.number + "_" + r.year + "_" + r.session;
          if (!map[sessionKey]) {
            map[sessionKey] = {
              number: r.number,
              year: r.year,
              session: r.session,
              notices: {}
            };
          }

          const notice = r.notice_no;
          if (!map[sessionKey].notices[notice]) {
            map[sessionKey].notices[notice] = {};
          }

          const member = r.member_name;
          if (!map[sessionKey].notices[notice][member]) {
            map[sessionKey].notices[notice][member] = {
              group: r.group,
              records: []
            };
          }

          map[sessionKey].notices[notice][member].records.push(r);
        });

        return Object.values(map);
      }

      function renderTreeRows(list, limit, expandKey) {
        const expanded = !!expandedMap[expandKey];
        let html = "";
        let count = 0;

        for (let i = 0; i < list.length; i++) {
          if (!expanded && count >= limit) break;

          const r = list[i];
          html += `
            <div class="tree-row depth-${getDepth(r)}">
              <div class="tree-inner">
                <span class="tree-label-badge">${escapeHtml(buildTreeLabel(r))}</span>
                <div class="tree-content">${escapeHtml(r.content)}</div>
              </div>
            </div>
          `;
          count++;
        }

        if (!expanded && list.length > limit) {
          html += `
            <div class="more-wrap">
              <button class="more-btn" data-key="${escapeHtml(expandKey)}">
                もっと見る
              </button>
            </div>
          `;
        } else if (expanded && list.length > limit) {
          html += `
            <div class="more-wrap">
              <button class="more-btn" data-key="${escapeHtml(expandKey)}">
                閉じる
              </button>
            </div>
          `;
        }

        return html;
      }

      function renderTable(records) {
        if (records.length === 0) {
          els.resultsArea.innerHTML = `<div class="empty-box">検索結果がありません</div>`;
          return;
        }

        let html = `
          <div class="table-wrap">
            <table class="results-table">
              <thead>
                <tr>
                  <th>定例会</th>
                  <th>通告No</th>
                  <th>議員名（会派）</th>
                  <th>項目</th>
                  <th>内容</th>
                </tr>
              </thead>
              <tbody>
        `;

        records.forEach(r => {
          html += `
            <tr>
              <td class="muted">${escapeHtml(formatYS(r))}</td>
              <td><span class="mono-chip">No.${escapeHtml(r.notice_no)}</span></td>
              <td>
                <div><strong>${escapeHtml(r.member_name)}</strong></div>
                <div class="muted">${escapeHtml(r.group)}</div>
              </td>
              <td><span class="mono-chip">${escapeHtml(buildTreeLabel(r))}</span></td>
              <td>${escapeHtml(r.content)}</td>
            </tr>
          `;
        });

        html += `
              </tbody>
            </table>
          </div>
        `;

        els.resultsArea.innerHTML = html;
      }

      function renderMemberCards(groups) {
        if (groups.length === 0) {
          els.resultsArea.innerHTML = `<div class="empty-box">検索結果がありません</div>`;
          return;
        }

        let html = `<div class="cards">`;

        groups.forEach(g => {
          let totalRows = 0;
          Object.values(g.ys).forEach(ys => {
            Object.values(ys.notices).forEach(list => {
              totalRows += list.length;
            });
          });

          html += `
            <section class="card">
              <div class="card-header">
                <h3 class="card-title">${escapeHtml(g.member)}</h3>
                <div class="card-count">${escapeHtml(g.group || "所属なし")}</div>
              </div>
          `;

          const ysList = Object.values(g.ys).sort(compareRecords);
          ysList.forEach(ys => {
            html += `
              <div class="section-block">
                <div class="section-title">${escapeHtml(formatYS(ys))}</div>
            `;

            const notices = Object.keys(ys.notices).sort((a, b) => {
              return state.sortOrder === "asc"
                ? toNumber(a) - toNumber(b)
                : toNumber(b) - toNumber(a);
            });

            notices.forEach(n => {
              const list = ys.notices[n].slice().sort(compareTreeRecords);
              const key = `member:${g.member}`;

              html += `
                <div class="notice-block">
                  <div class="notice-title">通告No: ${escapeHtml(n)}</div>
                  <div class="tree-block">
                    ${renderTreeRows(list, 3, key)}
                  </div>
                </div>
              `;
            });

            html += `</div>`;
          });

          html += `</section>`;
        });

        html += `</div>`;
        els.resultsArea.innerHTML = html;
      }

      function renderSessionCards(groups) {
        if (groups.length === 0) {
          els.resultsArea.innerHTML = `<div class="empty-box">検索結果がありません</div>`;
          return;
        }

        let html = `<div class="cards">`;

        groups.sort(compareRecords).forEach(s => {
          html += `
            <section class="card">
              <div class="card-header">
                <h3 class="card-title">${escapeHtml(formatYS(s))}</h3>
                <div class="card-count">回ごと</div>
              </div>
          `;

          const notices = Object.keys(s.notices).sort((a, b) => {
            return state.sortOrder === "asc"
              ? toNumber(a) - toNumber(b)
              : toNumber(b) - toNumber(a);
          });

          notices.forEach(n => {
            const members = Object.keys(s.notices[n]).sort();

            html += `
              <div class="section-block">
                <div class="section-title">通告No: ${escapeHtml(n)}</div>
            `;

            members.forEach(m => {
              const obj = s.notices[n][m];
              const key = `session:${s.number}_${s.year}_${s.session}:${n}:${m}`;
              const sortedList = obj.records.slice().sort(compareTreeRecords);

              html += `
                <div class="notice-block">
                  <div class="member-title">${escapeHtml(m)} <span class="muted">(${escapeHtml(obj.group || "所属なし")})</span></div>
                  <div class="tree-block">
                    ${renderTreeRows(sortedList, 3, key)}
                  </div>
                </div>
              `;
            });

            html += `</div>`;
          });

          html += `</section>`;
        });

        html += `</div>`;
        els.resultsArea.innerHTML = html;
      }

      function updateViewButtons() {
        [els.viewTableBtn, els.viewMemberBtn, els.viewSessionBtn].forEach(btn => {
          btn.classList.remove("active");
        });

        if (state.viewMode === "table") els.viewTableBtn.classList.add("active");
        if (state.viewMode === "member") els.viewMemberBtn.classList.add("active");
        if (state.viewMode === "session") els.viewSessionBtn.classList.add("active");
      }

      function render() {
        const data = filterRecords(RECORDS, state.keyword).sort(compareRecords);

        els.summaryKeyword.textContent = state.keyword ? state.keyword : "なし";
        els.summaryCount.textContent = data.length + "件";

        const viewLabels = {
          table: "一覧表",
          member: "人ごと",
          session: "回ごと"
        };
        els.summaryView.textContent = viewLabels[state.viewMode];

        updateViewButtons();

        if (state.viewMode === "table") {
          renderTable(data);
        } else if (state.viewMode === "member") {
          renderMemberCards(groupMember(data));
        } else {
          renderSessionCards(groupSession(data));
        }
      }

      function bind() {
        els.searchBtn.addEventListener("click", () => {
          state.keyword = els.keywordInput.value;
          render();
        });

        els.keywordInput.addEventListener("keydown", e => {
          if (e.key === "Enter") {
            e.preventDefault();
            state.keyword = els.keywordInput.value;
            render();
          }
        });

        els.clearBtn.addEventListener("click", () => {
          state.keyword = "";
          els.keywordInput.value = "";
          Object.keys(expandedMap).forEach(k => delete expandedMap[k]);
          render();
        });

        els.viewTableBtn.addEventListener("click", () => {
          state.viewMode = "table";
          render();
        });

        els.viewMemberBtn.addEventListener("click", () => {
          state.viewMode = "member";
          render();
        });

        els.viewSessionBtn.addEventListener("click", () => {
          state.viewMode = "session";
          render();
        });

        els.sortSelect.addEventListener("change", e => {
          state.sortOrder = e.target.value;
          render();
        });

        els.resultsArea.addEventListener("click", e => {
          const btn = e.target.closest(".more-btn");
          if (!btn) return;
          const key = btn.getAttribute("data-key");
          if (!key) return;
          expandedMap[key] = !expandedMap[key];
          render();
        });
      }

      bind();
      render();
    })();
  </script>
</body>
</html>
