<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>議員情報詳細</title>

  <link rel="stylesheet" href="../../css/common.css" />

  <style>
    .page-title {
      font-size: 28px;
    }

    .toggle-wrap {
      margin-top: 10px;
    }

    .toggle-button {
      border: 1px solid #cbd6e2;
      background: #fff;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .toggle-button:hover {
      background: #f5f8fb;
    }

    .toggle-content.is-collapsed .history-row:nth-child(n + 4) {
      display: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 id="pageTitle" class="page-title">議員詳細</h1>
      <p id="pageDesc" class="page-desc">議員の詳細を表示します。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card">
      <h2>基本情報</h2>
      <div id="basicArea" class="summary-grid"></div>
    </section>

    <section class="card">
      <h2>現在所属</h2>
      <div id="currentArea" class="detail-grid"></div>
    </section>

    <section class="card">
      <h2>委員会履歴</h2>
      <div id="committeeHistoryArea" class="detail-grid"></div>
    </section>

    <section class="card">
      <h2>会派履歴</h2>
      <div id="partyHistoryArea"></div>
    </section>

    <section class="card">
      <h2>在任履歴</h2>
      <div id="officeHistoryArea"></div>
    </section>

    <section class="card">
      <h2>連絡先履歴</h2>
      <div id="contactHistoryArea"></div>
    </section>

    <section class="card">
      <h2>審議会履歴</h2>
      <div id="councilHistoryArea"></div>
    </section>
  </div>

  <script src="../../data/members/members.js"></script>
  <script src="../../data/members/office_terms.js"></script>
  <script src="../../data/members/parties.js"></script>
  <script src="../../data/members/member_parties.js"></script>
  <script src="../../data/committees/committees.js"></script>
  <script src="../../data/committees/member_committees.js"></script>
  <script src="../../data/councils/councils.js"></script>
  <script src="../../data/councils/member_councils.js"></script>
  <script src="../../data/members/contacts.js"></script>
  <script src="../../data/meetings/meetings.js"></script>
  <script src="../../data/committees/special_committees.js"></script>
  <script src="../../data/committees/special_committee_instances.js"></script>
  <script src="../../data/committees/special_committee_members.js"></script>

  <script src="../../js/core/common.js"></script>
  <script src="../../js/core/utils.js"></script>
  <script src="../../js/core/formatters.js"></script>
  <script src="../../js/core/app.js"></script>
  <script src="../../js/members/view_member_detail.js"></script>
</body>
</html>
