<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>members</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f7f8fa;
      color: #222;
      font-family: sans-serif;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .page-header {
      margin-bottom: 16px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .page-desc {
      margin: 0;
      color: #555;
      font-size: 14px;
    }

    .status-details {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .status-details summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: bold;
      user-select: none;
    }

    .status-details summary::-webkit-details-marker {
      display: none;
    }

    .status-details summary::before {
      content: "▶ ";
      color: #555;
    }

    .status-details[open] summary::before {
      content: "▼ ";
    }

    .status-body {
      border-top: 1px solid #edf1f5;
      padding: 14px 16px;
    }

    .status-line {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      margin: 0;
    }

    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 160px 240px 280px 1fr;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      font-weight: bold;
    }

    .field input,
    .field select {
      height: 38px;
      padding: 0 10px;
      border: 1px solid #c8d0db;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      font-size: 14px;
    }

    .result-meta {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .result-table-wrap {
      overflow-x: auto;
      padding-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #e5e9ef;
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f2f5f9;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .clickable-row {
      cursor: pointer;
    }

    .clickable-row:hover {
      background: #f8fbff;
    }

    .empty {
      padding: 18px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccd5df;
      border-radius: 10px;
      background: #fafbfc;
    }

    @media (max-width: 980px) {
      .search-row {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .page {
        padding: 14px;
      }

      .search-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1 class="page-title">議員管理システム</h1>
      <p class="page-desc">現職議員の一覧と詳細を確認する画面です。</p>
    </header>

    <details class="status-details">
      <summary>動作確認</summary>
      <div class="status-body">
        <div id="statusBox" class="status-line">読み込み中...</div>
      </div>
    </details>

    <section class="card">
      <h2>検索条件</h2>
      <div class="search-row">
        <div class="field">
          <label>表示条件</label>
          <label class="checkbox-row">
            <input id="showCurrentOnly" type="checkbox" checked />
            現職のみ
          </label>
        </div>

        <div class="field">
          <label for="searchParty">会派</label>
          <select id="searchParty"></select>
        </div>

        <div class="field">
          <label for="searchCommittee">現在委員会</label>
          <select id="searchCommittee"></select>
        </div>

        <div class="field">
          <label for="searchName">氏名検索</label>
          <input id="searchName" type="text" placeholder="例: 山田" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>議員一覧</h2>
      <div id="resultMeta" class="result-meta">0件</div>
      <div id="resultArea"></div>
    </section>
  </div>

 <script src="../../data/members.js"></script>
<script src="../../data/office_terms.js"></script>
<script src="../../data/parties.js"></script>
<script src="../../data/member_parties.js"></script>
<script src="../../data/committees.js"></script>
<script src="../../data/member_committees.js"></script>
<script src="../../data/councils.js"></script>
<script src="../../data/member_councils.js"></script>
<script src="../../data/contacts.js"></script>
<script src="../../data/change_logs.js"></script>
<script src="../../data/codes.js"></script>
<script src="../../data/meetings.js"></script>
<script src="../../data/special_committees.js"></script>
<script src="../../data/special_committee_instances.js"></script>
<script src="../../data/special_committee_members.js"></script>

<script src="../../js/core/utils.js"></script>
<script src="../../js/core/formatters.js"></script>
<script src="../../js/core/app.js"></script>
<script src="../../js/members/view_members.js"></script>
</body>
</html>
