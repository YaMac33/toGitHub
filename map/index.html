<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>地点マップ</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- 初期データ -->
  <script src="./pins.js"></script>

  <!-- ロジック -->
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="page">

    <!-- ヘッダー -->
    <header class="header">
      <h1 class="title">地点マップ</h1>
      <p class="subtitle">地図クリックでピンを配置</p>
    </header>

    <!-- 操作バー -->
    <div class="toolbar">
      <button id="btnAddMode">＋ピン追加モード</button>
      <button id="btnExport">エクスポート</button>
      <span id="status">通常モード</span>
    </div>

    <!-- メイン -->
    <main class="layout">

      <!-- 地図エリア -->
      <section class="map-area">
        <div class="map-container" id="mapContainer">

          <!-- 地図画像 -->
          <img src="./map.png" class="map-image" id="mapImage" />

          <!-- ピン描画エリア -->
          <div class="pin-layer" id="pinLayer"></div>

          <!-- 仮ピン -->
          <div class="temp-pin hidden" id="tempPin"></div>

        </div>

        <!-- 座標表示 -->
        <div class="coords">
          X: <span id="coordX">--</span> /
          Y: <span id="coordY">--</span>
        </div>
      </section>

      <!-- サイド -->
      <aside class="side">

        <!-- 一覧 -->
        <div class="list">
          <h2>ピン一覧</h2>
          <ul id="pinList"></ul>
        </div>

        <!-- 詳細 -->
        <div class="detail">
          <h2>詳細</h2>
          <div id="pinDetail">
            未選択
          </div>
        </div>

      </aside>

    </main>

  </div>
</body>
</html>
