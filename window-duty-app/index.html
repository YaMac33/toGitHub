<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>窓口受付当番表作成アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>窓口受付当番表作成アプリ</h1>
      <p>対象月を選択し、平日のA〜Dの4枠に職員を自動割当します。土日と手動設定した祝日は除外します。</p>
    </header>

    <main class="layout">
      <section class="card schedule-card" aria-labelledby="schedule-title">
        <div class="section-heading">
          <div>
            <h2 id="schedule-title">当番表作成</h2>
            <p class="section-note">対象月を選んで作成すると、下の表にすぐ反映されます。</p>
          </div>
          <span id="scheduleLabel" class="count-label">未作成</span>
        </div>

        <div class="action-panel">
          <label class="field">
            <span>年</span>
            <input id="yearInput" type="number" min="2000" max="2100" inputmode="numeric">
          </label>

          <label class="field">
            <span>月</span>
            <select id="monthSelect">
              <option value="1">1月</option>
              <option value="2">2月</option>
              <option value="3">3月</option>
              <option value="4">4月</option>
              <option value="5">5月</option>
              <option value="6">6月</option>
              <option value="7">7月</option>
              <option value="8">8月</option>
              <option value="9">9月</option>
              <option value="10">10月</option>
              <option value="11">11月</option>
              <option value="12">12月</option>
            </select>
          </label>

          <button id="generateBtn" type="button" class="primary">自動作成</button>
          <button id="regenerateBtn" type="button">再作成</button>
          <button id="csvBtn" type="button">CSV出力</button>
        </div>

        <div id="messageArea" class="message-area" role="status" aria-live="polite"></div>

        <div class="table-wrap schedule-table-wrap">
          <table class="schedule-table">
            <thead>
              <tr>
                <th>日付</th>
                <th>曜日</th>
                <th>A</th>
                <th>B</th>
                <th>C</th>
                <th>D</th>
              </tr>
            </thead>
            <tbody id="scheduleTableBody">
              <tr>
                <td colspan="6" class="empty-cell">対象月を選択して当番表を作成してください。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="settings-grid">
        <section class="card" aria-labelledby="vacation-title">
          <div class="section-heading">
            <h2 id="vacation-title">休暇設定</h2>
          </div>

          <div class="form-row">
            <label class="field">
              <span>対象者</span>
              <select id="vacationStaffSelect"></select>
            </label>

            <label class="field">
              <span>休暇日</span>
              <input id="vacationDateInput" type="date">
            </label>

            <button id="addVacationBtn" type="button" class="primary">休暇を追加</button>
          </div>

          <div class="table-wrap compact-table">
            <table>
              <thead>
                <tr>
                  <th>対象者</th>
                  <th>休暇日</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="vacationTableBody">
                <tr>
                  <td colspan="3" class="empty-cell">登録済み休暇はありません。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="card" aria-labelledby="holiday-title">
          <div class="section-heading">
            <h2 id="holiday-title">祝日設定</h2>
          </div>

          <div class="form-row holiday-form">
            <label class="field">
              <span>祝日</span>
              <input id="holidayDateInput" type="date">
            </label>

            <label class="field">
              <span>名称</span>
              <input id="holidayNameInput" type="text" placeholder="例：建国記念の日">
            </label>

            <button id="addHolidayBtn" type="button" class="primary">祝日を追加</button>
          </div>

          <div class="table-wrap compact-table">
            <table>
              <thead>
                <tr>
                  <th>日付</th>
                  <th>名称</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="holidayTableBody">
                <tr>
                  <td colspan="3" class="empty-cell">登録済み祝日はありません。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>

      <details id="staffDetails" class="card staff-details">
        <summary>
          <span>職員一覧</span>
          <span id="staffCount" class="count-label">0人</span>
        </summary>

        <div class="staff-tools">
          <div class="form-row add-staff-form">
            <label class="field">
              <span>氏名</span>
              <input id="staffNameInput" type="text" placeholder="例：山田 太郎">
            </label>

            <label class="field">
              <span>区分</span>
              <select id="staffTypeSelect">
                <option value="regular">正規</option>
                <option value="parttime">非正規</option>
              </select>
            </label>

            <button id="addStaffBtn" type="button" class="primary">職員を追加</button>
            <button id="sampleBtn" type="button">サンプル職員を読み込む</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>staff_id</th>
                <th>氏名</th>
                <th>区分</th>
                <th>active</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="staffTableBody">
              <tr>
                <td colspan="5" class="empty-cell">職員データがありません。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </details>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
