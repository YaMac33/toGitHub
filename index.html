<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>一問一答アプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #dbe3ee;
      --text: #0f172a;
      --sub: #64748b;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --gray: #475569;
      --yellow: #ca8a04;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab-btn, .btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .tab-btn.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .hidden { display: none !important; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .question {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-block;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
    }

    .pill.unanswered {
      background: #f1f5f9;
      color: var(--gray);
    }

    .pill.wrong {
      background: #fef2f2;
      color: var(--red);
    }

    .pill.mastered {
      background: #f0fdf4;
      color: var(--green);
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    input[type="text"], input[type="number"] {
      flex: 1 1 260px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fff;
    }

    .result {
      min-height: 28px;
      font-weight: 700;
      margin: 10px 0 6px;
    }

    .result.ok { color: var(--green); }
    .result.ng { color: var(--red); }

    .explanation {
      color: var(--text);
      line-height: 1.7;
      margin-top: 8px;
    }

    .explanation a {
      color: var(--blue);
      word-break: break-all;
    }

    .subtext {
      color: var(--sub);
      font-size: 13px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      font-size: 13px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .filter-row, .rate-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }

    .badge-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
    }

    .badge-link:hover {
      text-decoration: underline;
    }

    .small-btn {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
    }

    @media (max-width: 720px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .question {
        font-size: 20px;
      }

      th:nth-child(3),
      td:nth-child(3),
      th:nth-child(5),
      td:nth-child(5) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button id="tabQuiz" class="tab-btn active" type="button">出題</button>
      <button id="tabList" class="tab-btn" type="button">一覧</button>
      <button id="tabSettings" class="tab-btn" type="button">設定</button>
    </div>

    <!-- 出題 -->
    <section id="viewQuiz">
      <div class="stats">
        <div class="stat">
          <div class="stat-label">未回答</div>
          <div id="statUnanswered" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">不正解</div>
          <div id="statWrong" class="stat-value">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">マスター</div>
          <div id="statMastered" class="stat-value">0</div>
        </div>
      </div>

      <div class="card">
        <div class="meta">
          <span id="statusPill" class="pill unanswered">未回答</span>
          <span id="idPill" class="pill">ID: -</span>
        </div>

        <div id="question" class="question">読み込み中...</div>

        <div class="input-row">
          <input id="answerInput" type="text" placeholder="答えを入力">
        </div>

        <div class="controls">
          <button id="submitBtn" class="btn" type="button">回答</button>
          <button id="nextBtn" class="btn" type="button">次の問題</button>
        </div>

        <div id="result" class="result"></div>
        <div id="explanation" class="explanation"></div>
        <div class="subtext" style="margin-top: 10px;">
          判定は完全一致です。不正解は2回連続正解でマスターに戻ります。
        </div>
      </div>
    </section>

    <!-- 一覧 -->
    <section id="viewList" class="hidden">
      <div class="card">
        <div class="filter-row">
          <input id="listSearch" type="text" placeholder="ID / 問題文 / 解説 で検索">
          <select id="listFilter" class="btn" style="padding-right: 34px;">
            <option value="all">すべて</option>
            <option value="unanswered">未回答</option>
            <option value="wrong">不正解</option>
            <option value="mastered">マスター</option>
          </select>
          <button id="reloadListBtn" class="btn" type="button">再読込</button>
        </div>

        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>状態</th>
                <th>ID</th>
                <th>問題</th>
                <th>答え</th>
                <th>解説</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 設定 -->
    <section id="viewSettings" class="hidden">
      <div class="card">
        <h2 style="margin-top:0;">出題率設定</h2>
        <div class="subtext" style="margin-bottom: 14px;">
          合計は100でなくてもOKです。比率として扱います。
        </div>

        <div class="rate-row">
          <label style="min-width: 110px;">未回答</label>
          <input id="rateUnanswered" type="number" min="0" step="1" value="40">
        </div>
        <div class="rate-row">
          <label style="min-width: 110px;">不正解</label>
          <input id="rateWrong" type="number" min="0" step="1" value="50">
        </div>
        <div class="rate-row">
          <label style="min-width: 110px;">マスター</label>
          <input id="rateMastered" type="number" min="0" step="1" value="10">
        </div>

        <div class="controls">
          <button id="saveRatesBtn" class="btn" type="button">出題率を保存</button>
          <button id="resetProgressBtn" class="btn" type="button">学習履歴をリセット</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const DATA_URL = "data.json";
    const PROGRESS_KEY = "qa_progress_v2";
    const RATES_KEY = "qa_rates_v1";
    const AUTO_NEXT_DELAY = 800;

    let questions = [];
    let currentQuestion = null;
    let lastQuestionId = null;

    let progress = loadProgress();
    let rates = loadRates();

    const $ = (id) => document.getElementById(id);

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
    }

    function loadRates() {
      try {
        return {
          unanswered: 40,
          wrong: 50,
          mastered: 10,
          ...JSON.parse(localStorage.getItem(RATES_KEY) || "{}")
        };
      } catch {
        return { unanswered: 40, wrong: 50, mastered: 10 };
      }
    }

    function saveRates() {
      localStorage.setItem(RATES_KEY, JSON.stringify(rates));
    }

    function getQuestionState(id) {
      const p = progress[id];
      if (!p) return "unanswered";
      if (p.status === "wrong") return "wrong";
      if (p.status === "mastered") return "mastered";
      return "unanswered";
    }

    function getStatusLabel(state) {
      if (state === "wrong") return "不正解";
      if (state === "mastered") return "マスター";
      return "未回答";
    }

    function getStatusClass(state) {
      if (state === "wrong") return "wrong";
      if (state === "mastered") return "mastered";
      return "unanswered";
    }

    function classifyQuestions() {
      return {
        unanswered: questions.filter(q => getQuestionState(q.id) === "unanswered"),
        wrong: questions.filter(q => getQuestionState(q.id) === "wrong"),
        mastered: questions.filter(q => getQuestionState(q.id) === "mastered")
      };
    }

    function updateStats() {
      const groups = classifyQuestions();
      $("statUnanswered").textContent = groups.unanswered.length;
      $("statWrong").textContent = groups.wrong.length;
      $("statMastered").textContent = groups.mastered.length;
    }

    function weightedPickGroup(groups) {
      const available = [];
      if (groups.unanswered.length > 0 && rates.unanswered > 0) {
        available.push({ key: "unanswered", weight: Number(rates.unanswered) });
      }
      if (groups.wrong.length > 0 && rates.wrong > 0) {
        available.push({ key: "wrong", weight: Number(rates.wrong) });
      }
      if (groups.mastered.length > 0 && rates.mastered > 0) {
        available.push({ key: "mastered", weight: Number(rates.mastered) });
      }

      if (available.length === 0) {
        if (questions.length === 0) return null;
        return "all";
      }

      const total = available.reduce((sum, item) => sum + item.weight, 0);
      let r = Math.random() * total;

      for (const item of available) {
        r -= item.weight;
        if (r <= 0) return item.key;
      }

      return available[available.length - 1].key;
    }

    function pickRandomQuestion() {
      if (questions.length === 0) return null;

      const groups = classifyQuestions();
      const selectedGroup = weightedPickGroup(groups);

      let pool;
      if (selectedGroup === "unanswered") pool = groups.unanswered;
      else if (selectedGroup === "wrong") pool = groups.wrong;
      else if (selectedGroup === "mastered") pool = groups.mastered;
      else pool = questions;

      if (!pool || pool.length === 0) pool = questions;

      if (pool.length > 1 && lastQuestionId) {
        const withoutLast = pool.filter(q => q.id !== lastQuestionId);
        if (withoutLast.length > 0) pool = withoutLast;
      }

      return pool[Math.floor(Math.random() * pool.length)];
    }

    function renderQuestion() {
      if (!currentQuestion) {
        $("question").textContent = "問題がありません。";
        $("idPill").textContent = "ID: -";
        $("statusPill").textContent = "-";
        $("statusPill").className = "pill";
        return;
      }

      const state = getQuestionState(currentQuestion.id);

      $("question").textContent = currentQuestion.question;
      $("idPill").textContent = "ID: " + currentQuestion.id;

      const pill = $("statusPill");
      pill.textContent = getStatusLabel(state);
      pill.className = "pill " + getStatusClass(state);

      $("answerInput").value = "";
      $("result").textContent = "";
      $("result").className = "result";
      $("explanation").innerHTML = "";

      $("answerInput").focus();
    }

    function showExplanation(q) {
      let html = `<div>${escapeHtml(q.explanation || "")}</div>`;

      if (q.link) {
        const safeUrl = escapeAttribute(q.link);
        html += `<div><a href="${safeUrl}" target="_blank" rel="noopener noreferrer">参考URLを開く</a></div>`;
      }

      $("explanation").innerHTML = html;
    }

    function nextQuestion() {
      currentQuestion = pickRandomQuestion();
      if (!currentQuestion) return;
      lastQuestionId = currentQuestion.id;
      renderQuestion();
      updateStats();
    }

    function submitAnswer() {
      if (!currentQuestion) return;

      const input = $("answerInput").value.trim();
      if (!input) return;

      const answers = Array.isArray(currentQuestion.answer) ? currentQuestion.answer : [];
      const isCorrect = answers.includes(input);

      if (!progress[currentQuestion.id]) {
        progress[currentQuestion.id] = {
          status: "unanswered",
          correctStreak: 0
        };
      }

      const p = progress[currentQuestion.id];

      if (isCorrect) {
        p.correctStreak = (p.correctStreak || 0) + 1;

        if (p.correctStreak >= 2) {
          p.status = "mastered";
        } else {
          if (p.status !== "wrong") {
            p.status = "mastered";
          }
        }

        $("result").textContent = "⭕ 正解";
        $("result").className = "result ok";
      } else {
        p.status = "wrong";
        p.correctStreak = 0;

        const firstAnswer = answers[0] || "";
        $("result").textContent = firstAnswer
          ? `❌ 不正解（正解: ${firstAnswer}）`
          : "❌ 不正解";
        $("result").className = "result ng";
      }

      progress[currentQuestion.id] = p;
      saveProgress();
      updateStats();
      showExplanation(currentQuestion);
      renderList();

      setTimeout(() => {
        nextQuestion();
      }, AUTO_NEXT_DELAY);
    }

    function renderList() {
      const body = $("listBody");
      const search = $("listSearch").value.trim().toLowerCase();
      const filter = $("listFilter").value;

      body.innerHTML = "";

      const filtered = questions.filter(q => {
        const state = getQuestionState(q.id);
        const matchFilter = filter === "all" ? true : state === filter;
        if (!matchFilter) return false;

        if (!search) return true;

        const haystack = [
          q.id,
          q.question,
          (Array.isArray(q.answer) ? q.answer.join(" ") : ""),
          q.explanation || ""
        ].join(" ").toLowerCase();

        return haystack.includes(search);
      });

      if (filtered.length === 0) {
        body.innerHTML = `<tr><td colspan="6">該当データなし</td></tr>`;
        return;
      }

      for (const q of filtered) {
        const tr = document.createElement("tr");
        const state = getQuestionState(q.id);
        const answers = Array.isArray(q.answer) ? q.answer.join(" / ") : "";
        const linkHtml = q.link
          ? `<a class="badge-link" href="${escapeAttribute(q.link)}" target="_blank" rel="noopener noreferrer">URL</a>`
          : "";

        tr.innerHTML = `
          <td>${escapeHtml(getStatusLabel(state))}</td>
          <td>${escapeHtml(q.id)}</td>
          <td>${escapeHtml(q.question)}</td>
          <td>${escapeHtml(answers)}</td>
          <td>${escapeHtml(q.explanation || "")}${linkHtml}</td>
          <td><button class="btn small-btn" type="button" data-id="${escapeAttribute(q.id)}">この問題を開く</button></td>
        `;

        tr.querySelector("button").addEventListener("click", () => {
          currentQuestion = q;
          lastQuestionId = q.id;
          showTab("quiz");
          renderQuestion();
        });

        body.appendChild(tr);
      }
    }

    function showTab(tab) {
      $("viewQuiz").classList.toggle("hidden", tab !== "quiz");
      $("viewList").classList.toggle("hidden", tab !== "list");
      $("viewSettings").classList.toggle("hidden", tab !== "settings");

      $("tabQuiz").classList.toggle("active", tab === "quiz");
      $("tabList").classList.toggle("active", tab === "list");
      $("tabSettings").classList.toggle("active", tab === "settings");

      if (tab === "list") renderList();
      if (tab === "settings") renderRates();
    }

    function renderRates() {
      $("rateUnanswered").value = rates.unanswered;
      $("rateWrong").value = rates.wrong;
      $("rateMastered").value = rates.mastered;
    }

    function saveRateSettings() {
      rates.unanswered = Math.max(0, Number($("rateUnanswered").value) || 0);
      rates.wrong = Math.max(0, Number($("rateWrong").value) || 0);
      rates.mastered = Math.max(0, Number($("rateMastered").value) || 0);
      saveRates();
      alert("出題率を保存しました。");
    }

    function resetProgress() {
      if (!confirm("学習履歴をリセットします。よろしいですか？")) return;
      progress = {};
      saveProgress();
      updateStats();
      renderList();
      if (currentQuestion) renderQuestion();
      alert("リセットしました。");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(str) {
      return escapeHtml(str);
    }

    async function loadData() {
      const res = await fetch(DATA_URL, { cache: "no-cache" });
      if (!res.ok) throw new Error("data.json の読み込みに失敗しました");
      const json = await res.json();

      questions = json.map(item => ({
        id: String(item.id || "").trim(),
        question: String(item.question || "").trim(),
        answer: Array.isArray(item.answer) ? item.answer.map(v => String(v)) : [],
        explanation: String(item.explanation || "").trim(),
        link: item.link ? String(item.link).trim() : ""
      })).filter(q => q.id && q.question && q.answer.length > 0);

      updateStats();
      renderList();
      nextQuestion();
    }

    $("submitBtn").addEventListener("click", submitAnswer);
    $("nextBtn").addEventListener("click", nextQuestion);

    $("answerInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitAnswer();
      }
    });

    $("tabQuiz").addEventListener("click", () => showTab("quiz"));
    $("tabList").addEventListener("click", () => showTab("list"));
    $("tabSettings").addEventListener("click", () => showTab("settings"));

    $("listSearch").addEventListener("input", renderList);
    $("listFilter").addEventListener("change", renderList);
    $("reloadListBtn").addEventListener("click", renderList);

    $("saveRatesBtn").addEventListener("click", saveRateSettings);
    $("resetProgressBtn").addEventListener("click", resetProgress);

    loadData().catch(err => {
      $("question").textContent = "読み込みに失敗しました";
      $("explanation").textContent = String(err.message || err);
    });
  </script>
</body>
</html>
