<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>index</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="viewer"></iframe>

  <script>
    const params = new URLSearchParams(location.search);
    const mode = params.get("mode");
    const viewer = document.getElementById("viewer");

    if (mode === "cgpt") {
      viewer.src = "CGPT.html";
    } else if (mode === "gmn") {
      viewer.src = "GMN.html";
    } else {
      document.body.innerHTML = "<h1>mode=cgpt または mode=gmn を指定してください</h1>";
    }
  </script>
</body>
</html>
