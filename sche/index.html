<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共有カレンダー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>共有カレンダー</h1>
        <div class="view-controls">
            <button id="btn-month" class="active">月間</button>
            <button id="btn-week">週間</button>
            <button id="btn-day">1日</button>
        </div>
        <div class="date-controls">
            <button id="btn-prev">&lt; 前</button>
            <span id="current-date-display"></span>
            <button id="btn-next">次 &gt;</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>表示選択</h3>
            <div id="calendar-toggles">
                </div>
        </aside>
        
        <main id="calendar-view">
            </main>
    </div>

    <script src="list.js"></script>
    <script src="app.js"></script>
</body>
</html>
