<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お弁当注文ポータル</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="sceneCanvas" aria-hidden="true"></canvas>

  <main class="portal">
    <header class="hero">
      <p class="eyebrow">Bentou Order Portal</p>
      <h1>お弁当注文</h1>
      <p class="lead">お弁当はこちらから</p>
    </header>

    <section class="shop-grid" aria-label="注文先">
      <a class="shop-card shop-card-maruhan" href="maruhan/index.html" data-shop="maruhan">
        <span class="shop-code">01</span>
        <span class="shop-content">
          <span class="shop-kicker">MARUHAN</span>
          <span class="shop-name">まるはん</span>
          <span class="shop-action">注文フォームへ</span>
        </span>
      </a>

      <a class="shop-card shop-card-purupuru" href="purupuru/index.html" data-shop="purupuru">
        <span class="shop-code">02</span>
        <span class="shop-content">
          <span class="shop-kicker">PURUPURU</span>
          <span class="shop-name">プルプル</span>
          <span class="shop-action">注文フォームへ</span>
        </span>
      </a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
