<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会議室予約表</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="../reservations.js"></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="page">
    <section class="header-card">
      <h1 class="page-title">会議室予約表</h1>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="month-nav">
            <button type="button" class="btn" id="prev-month-btn">＜前月</button>
            <div class="month-label" id="month-label">----</div>
            <button type="button" class="btn" id="next-month-btn">翌月＞</button>
          </div>

          <button type="button" class="btn" id="today-btn">今月へ戻る</button>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <span class="legend-pill kind-start">開始</span>
          <span>開始日</span>
        </div>
        <div class="legend-item">
          <span class="legend-pill kind-continue">継続</span>
          <span>期間中</span>
        </div>
        <div class="legend-item">
          <span class="legend-pill kind-end">終了</span>
          <span>終了日</span>
        </div>
        <div class="legend-item">
          <span class="legend-pill kind-single">当日</span>
          <span>単日予約</span>
        </div>
        <div class="legend-item">
          <span class="legend-sat"></span>
          <span>土曜</span>
        </div>
        <div class="legend-item">
          <span class="legend-sun"></span>
          <span>日曜</span>
        </div>
        <div class="legend-item">
          <span>セルをクリックすると詳細を表示</span>
        </div>
      </div>
    </section>

    <section class="table-card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>委員会室</th>
              <th>小委員会室</th>
              <th>部課長控室</th>
              <th>小会議室</th>
            </tr>
          </thead>
          <tbody id="reservation-body"></tbody>
        </table>
      </div>

      <div class="empty-message" id="empty-message" hidden>
        この条件に該当する予約はありません。
      </div>
    </section>
  </div>

  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <h2 id="modal-title">予約詳細</h2>
          <div class="modal-subtitle" id="modal-subtitle"></div>
        </div>
        <button type="button" class="icon-btn" id="modal-close-btn" aria-label="閉じる">×</button>
      </div>

      <div class="modal-body" id="modal-body"></div>

      <div class="footer-actions">
        <button type="button" class="btn btn-primary" id="modal-close-footer-btn">閉じる</button>
      </div>
    </div>
  </div>
</body>
</html>
