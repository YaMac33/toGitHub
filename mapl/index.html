<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAPL | オフライン地図メモ</title>
  <link rel="stylesheet" href="./lib/leaflet/leaflet.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1 class="app-title">MAPL</h1>
        <p class="app-subtitle">オフラインで使えるピン・経路メモ</p>
      </div>
      <div class="toolbar" aria-label="操作ボタン">
        <button id="btnPinMode" type="button">ピン追加</button>
        <button id="btnRouteMode" type="button">経路作成</button>
        <button id="btnExport" type="button">エクスポート</button>
        <button id="btnImport" type="button">インポート</button>
        <button id="btnClearSelection" type="button">選択解除</button>
      </div>
    </header>

    <main class="app-main">
      <section class="map-section">
        <div id="map" aria-label="地図表示エリア"></div>
      </section>

      <aside class="side-panel">
        <section class="panel-card summary-card">
          <h2>現在の状態</h2>
          <dl class="summary-list">
            <div>
              <dt>モード</dt>
              <dd id="currentModeText">通常</dd>
            </div>
            <div>
              <dt>選択</dt>
              <dd id="currentSelectionText">なし</dd>
            </div>
            <div>
              <dt>ヒント</dt>
              <dd id="modeHintText">地図上の対象を選択してください。</dd>
            </div>
          </dl>
        </section>

        <section class="panel-card list-card">
          <div class="card-header">
            <h2>ピン一覧</h2>
            <span id="pinCountText" class="count-chip">0件</span>
          </div>
          <div id="pinList" class="item-list" aria-live="polite"></div>
        </section>

        <section class="panel-card list-card">
          <div class="card-header">
            <h2>経路一覧</h2>
            <span id="routeCountText" class="count-chip">0件</span>
          </div>
          <div id="routeList" class="item-list" aria-live="polite"></div>
        </section>

        <section id="detailPanel" class="panel-card detail-card">
          <h2>詳細 / 編集</h2>

          <div id="emptyDetail" class="empty-detail">
            <p>ピンまたは経路を選択すると、ここで編集できます。</p>
          </div>

          <form id="pinEditor" class="editor hidden" autocomplete="off">
            <div class="field">
              <label for="pinNameInput">名称</label>
              <input id="pinNameInput" type="text" maxlength="100">
            </div>
            <div class="field">
              <label for="pinCategoryInput">カテゴリ</label>
              <input id="pinCategoryInput" type="text" maxlength="60">
            </div>
            <div class="field">
              <label for="pinMemoInput">メモ</label>
              <textarea id="pinMemoInput" rows="5"></textarea>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="pinLatInput">緯度</label>
                <input id="pinLatInput" type="number" step="0.000001">
              </div>
              <div class="field">
                <label for="pinLngInput">経度</label>
                <input id="pinLngInput" type="number" step="0.000001">
              </div>
            </div>
            <div class="editor-actions">
              <button id="pinCenterBtn" type="button">中央表示</button>
              <button id="pinDeleteBtn" type="button" class="danger">削除</button>
            </div>
          </form>

          <section id="routeEditor" class="editor hidden">
            <div class="field">
              <label for="routeNameInput">経路名</label>
              <input id="routeNameInput" type="text" maxlength="100">
            </div>
            <div class="field-row">
              <div class="field">
                <label for="routeColorInput">色</label>
                <input id="routeColorInput" type="color" value="#2f6fed">
              </div>
              <div class="field inline-field">
                <span class="field-label">点数</span>
                <strong id="routePointCount">0点</strong>
              </div>
            </div>
            <div class="editor-actions">
              <button id="routeUndoBtn" type="button">1点戻す</button>
              <button id="routeSaveBtn" type="button">保存</button>
              <button id="routeFinishBtn" type="button">編集終了</button>
            </div>
            <div class="field">
              <span class="field-label">点一覧</span>
              <div id="routePointList" class="point-list"></div>
            </div>
          </section>
        </section>
      </aside>
    </main>

    <footer class="app-footer">
      <div><strong>ステータス:</strong> <span id="statusMessage">準備完了</span></div>
      <div><strong>座標:</strong> <span id="cursorLatLng">--</span></div>
      <div><strong>現在状態:</strong> <span id="footerModeText">通常</span></div>
      <div><strong>操作ヒント:</strong> <span id="footerHintText">地図をクリックすると選択や追加を行えます。</span></div>
    </footer>
  </div>

  <div id="appModal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="modalTitle">モーダル</h2>
        <button id="modalClose" type="button" class="ghost">閉じる</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="./data/pins.js"></script>
  <script src="./data/routes.js"></script>
  <script src="./data/map-config.js"></script>
  <script src="./lib/leaflet/leaflet.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/map.js"></script>
  <script src="./js/pins.js"></script>
  <script src="./js/routes.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
